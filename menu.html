<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Royal Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E7B5;
            --burgundy: #6D1A2D;
            --cream: #FDF3E0;
            --dark: #1A0F0A;
            --glass: rgba(20, 10, 10, 0.75);
            --light-bg: #FEFAF0;
            --light-text: #2D1A0A;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: background 0.5s, color 0.5s;
        }
        body.light-mode {
            background: var(--light-bg);
            color: var(--light-text);
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192,57,43,0.1) 0%, transparent 50%);
            z-index: 0;
            transition: opacity 0.5s;
        }
        body.light-mode::before {
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192,57,43,0.05) 0%, transparent 50%);
        }

        /* Food reveal animation */
        .food-reveal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease 0.8s, visibility 0.5s ease 0.8s;
        }
        body.light-mode .food-reveal { background: var(--light-bg); }
        .food-reveal.hidden { opacity: 0; visibility: hidden; }
        .dish { position: relative; width: 180px; height: 180px; }
        .plate {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 150px; height: 30px;
            background: radial-gradient(circle at 50% 30%, #f0f0f0, #aaa);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .food-icon {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            font-size: 3.5rem;
            animation: float 2s infinite alternate;
        }
        @keyframes float {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-10px); }
        }
        .steam {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: steam 1.5s infinite;
        }
        @keyframes steam {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0.8; }
            100% { transform: translateX(-50%) translateY(-30px) scale(1.2); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 7rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.9s, transform 0.6s ease 0.9s;
        }
        .container.visible { opacity: 1; transform: translateY(0); }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 30;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        body.light-mode .header { background: rgba(255,255,255,0.8); }
        .header img {
            width: 80px; height: 80px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 0.5rem;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }
        .header p { color: var(--cream); font-style: italic; }
        body.light-mode .header p { color: #6B4A2A; }

        /* Category cards */
        .category {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 24px;
            padding: 1.3rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.light-mode .category { background: rgba(255,255,255,0.7); }
        .cat-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 0.3rem;
        }

        /* Item styles */
        .item {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 1rem 0;
        }
        body.light-mode .item { border-bottom-color: rgba(0,0,0,0.1); }
        .item-name { font-weight: 600; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem; }
        .item-image {
            width: 50px; height: 50px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        .item-desc { font-size: 0.85rem; opacity: 0.7; margin-bottom: 0.5rem; }
        .variant-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 0.3rem;
            padding: 0.2rem 0;
        }
        .variant-name { flex: 1; font-size: 0.9rem; }
        .variant-price { color: var(--gold); font-weight: 600; margin: 0 0.5rem; }
        .qty-box { display: flex; align-items: center; gap: 0.3rem; }
        .qty-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            background: rgba(212,175,55,0.15);
            color: var(--gold);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn:active { background: var(--gold); color: var(--dark); }
        .qty-num { min-width: 20px; text-align: center; font-weight: 600; }

        /* Floating cart */
        #cartFloat {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            background: var(--gold);
            color: var(--dark);
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 0 30px var(--gold);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #cartPreview {
            display: none;
            position: fixed;
            bottom: 5.5rem;
            right: 1.5rem;
            width: 90%;
            max-width: 350px;
            background: rgba(10,5,5,0.95);
            backdrop-filter: blur(30px);
            padding: 1.3rem;
            border-radius: 24px;
            border: 2px solid var(--gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            z-index: 19;
            max-height: 70vh;
            overflow-y: auto;
        }
        body.light-mode #cartPreview { background: rgba(255,255,255,0.95); color: var(--light-text); }
        #cartPreview h4 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 0.8rem; }
        #cartItems { list-style: none; margin: 0.5rem 0; }
        #cartItems li {
            display: flex;
            justify-content: space-between;
            margin: 0.5rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.3rem;
        }
        .remove-item { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 1rem; }
        .order-form-group { margin-top: 1rem; }
        .order-form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; }
        .order-form-group input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--gold);
            background: transparent;
            color: inherit;
        }
        #orderBtn {
            width: 100%;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 0.7rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 0.8rem;
            cursor: pointer;
        }

        /* Share button */
        .share-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle">🌓 Light Mode</button>

    <!-- Food reveal animation -->
    <div class="food-reveal" id="foodReveal">
        <div class="dish">
            <div class="plate"></div>
            <div class="food-icon">🍕</div>
            <div class="steam" style="margin-left:-15px;"></div>
            <div class="steam" style="margin-left:10px; animation-delay:0.5s;"></div>
        </div>
    </div>

    <div class="container" id="menuContent">
        <div class="header">
            <img id="logoImg" src="" alt="logo" style="display:none;" />
            <h1 id="cafeTitle"></h1>
            <p id="cafeDesc"></p>
        </div>
        <div id="menuList"></div>
        <button class="share-btn" id="shareMenuBtn">📤 Share this Menu</button>
    </div>

    <div id="cartFloat"><span>🛒</span> <span id="cartCount">0</span></div>
    <div id="cartPreview">
        <h4>Your Order</h4>
        <ul id="cartItems"></ul>
        <p style="color:var(--gold); font-weight:600;">Total: ₹<span id="cartTotal">0.00</span></p>
        <div class="order-form-group">
            <label>Table Number *</label>
            <input type="text" id="tableNumber" placeholder="e.g., 12" required />
        </div>
        <div class="order-form-group">
            <label>Your Name (optional)</label>
            <input type="text" id="customerName" placeholder="e.g., Rahul" />
        </div>
        <button id="orderBtn">Order via WhatsApp</button>
    </div>

    <script>
        // Reveal animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('foodReveal').classList.add('hidden');
                document.getElementById('menuContent').classList.add('visible');
            }, 2000);
        });

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeToggle.textContent = document.body.classList.contains('light-mode') ? '🌙 Dark Mode' : '🌓 Light Mode';
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://phunzwqocgtgnpsgvsyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBodW56d3FvY2d0Z25wc2d2c3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ2ODIsImV4cCI6MjA5NDA5MDY4Mn0.gWJ_NORZxMWz0EPJ425gDZew7MJUxWdo6L67snAE0dI';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            // Fetch cafe info
            const { data: cafe, error: cafeError } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (cafeError || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            document.getElementById('cafeTitle').textContent = cafe.cafe_name || 'Our Menu';
            document.getElementById('cafeDesc').textContent = cafe.description || '';
            const logo = document.getElementById('logoImg');
            if (cafe.logo_url) { logo.src = cafe.logo_url; logo.style.display = 'block'; }

            // Fetch items (only available)
            const { data: items, error: itemsError } = await client.from('menu_items')
                .select('*')
                .eq('cafe_id', cafeId)
                .eq('available', true)
                .order('created_at');

            if (itemsError) {
                document.getElementById('menuList').innerHTML = '<p style="text-align:center;">⚠️ Could not load menu items. Please try again.</p>';
                console.error(itemsError);
                return;
            }

            if (!items || items.length === 0) {
                document.getElementById('menuList').innerHTML = '<p style="text-align:center;">🍽️ No items available right now.</p>';
                return;
            }

            // Group by category
            const grouped = {};
            items.forEach(item => {
                const cat = item.category || 'Uncategorized';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });

            const menuList = document.getElementById('menuList');
            const cart = {};

            // Build menu
            for (const [cat, catItems] of Object.entries(grouped)) {
                const section = document.createElement('div');
                section.className = 'category';
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;

                catItems.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';

                    const hasVariants = item.description && item.description.startsWith('VAR::');
                    let variants = [];
                    if (hasVariants) {
                        const vStr = item.description.replace('VAR::', '');
                        vStr.split('|').forEach(p => {
                            const [name, price] = p.split('=');
                            variants.push({ name: name.trim(), price: parseFloat(price) });
                        });
                    } else {
                        variants.push({ name: '', price: parseFloat(item.price) });
                    }

                    const itemImageHtml = item.image_url ? `<img src="${item.image_url}" class="item-image" alt="${item.name}" />` : '';
                    const itemNameHtml = `<div class="item-name">${itemImageHtml}${item.name}</div>`;
                    const itemDescHtml = (hasVariants || !item.description) ? '' : `<div class="item-desc">${item.description}</div>`;

                    let variantsHtml = '';
                    variants.forEach((v) => {
                        const variantName = v.name || item.name;
                        variantsHtml += `
                            <div class="variant-row" data-variant-id="${v.name || 'default'}" data-price="${v.price}">
                                <span class="variant-name">${variantName}</span>
                                <span class="variant-price">₹${v.price}</span>
                                <div class="qty-box">
                                    <button class="qty-btn qty-dec">−</button>
                                    <span class="qty-num">0</span>
                                    <button class="qty-btn qty-inc">+</button>
                                </div>
                            </div>
                        `;
                    });

                    itemDiv.innerHTML = itemNameHtml + itemDescHtml + `<div class="variants-container">${variantsHtml}</div>`;
                    itemDiv.dataset.itemId = item.id;
                    itemDiv.dataset.itemName = item.name;
                    section.appendChild(itemDiv);
                });
                menuList.appendChild(section);
            }

            // Cart logic with variant‑specific quantities
            document.querySelectorAll('.item').forEach(itemDiv => {
                itemDiv.addEventListener('click', (e) => {
                    const btn = e.target;
                    if (!btn.classList.contains('qty-btn')) return;
                    const variantRow = btn.closest('.variant-row');
                    const variantId = variantRow.dataset.variantId;
                    const price = parseFloat(variantRow.dataset.price);
                    const itemId = itemDiv.dataset.itemId;
                    const itemName = itemDiv.dataset.itemName;
                    const variantName = variantRow.querySelector('.variant-name').textContent;
                    const qtySpan = variantRow.querySelector('.qty-num');
                    const cartKey = `${itemId}_${variantId}`;

                    let currentQty = cart[cartKey] ? cart[cartKey].qty : 0;

                    if (btn.classList.contains('qty-inc')) currentQty++;
                    else if (btn.classList.contains('qty-dec')) currentQty = Math.max(0, currentQty - 1);

                    if (currentQty === 0) delete cart[cartKey];
                    else cart[cartKey] = { id: itemId, name: itemName, variantName, price, qty: currentQty };

                    qtySpan.textContent = currentQty;
                    updateCartUI();
                });
            });

            // Cart UI
            const cartFloat = document.getElementById('cartFloat');
            const cartPreview = document.getElementById('cartPreview');
            const cartCountEl = document.getElementById('cartCount');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            let cartVisible = false;

            cartFloat.addEventListener('click', () => {
                cartVisible = !cartVisible;
                cartPreview.style.display = cartVisible ? 'block' : 'none';
            });

            function updateCartUI() {
                const items = Object.values(cart);
                cartCountEl.textContent = items.reduce((s, i) => s + i.qty, 0);
                cartTotalEl.textContent = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                cartItemsEl.innerHTML = items.map((item, idx) => `
                    <li>
                        <span>${item.name}${item.variantName && item.variantName !== item.name ? ' (' + item.variantName + ')' : ''} × ${item.qty}</span>
                        <span>₹${(item.price * item.qty).toFixed(2)}
                            <button class="remove-item" data-key="${Object.keys(cart)[idx]}">✕</button>
                        </span>
                    </li>
                `).join('');
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const key = e.target.dataset.key;
                        delete cart[key];
                        // Reset all quantity displays
                        document.querySelectorAll('.qty-num').forEach(qtySpan => qtySpan.textContent = '0');
                        Object.entries(cart).forEach(([k, v]) => {
                            const [itemId, variantId] = k.split('_');
                            const itemDiv = document.querySelector(`.item[data-item-id="${itemId}"]`);
                            if (itemDiv) {
                                const variantRow = itemDiv.querySelector(`.variant-row[data-variant-id="${variantId}"]`);
                                if (variantRow) variantRow.querySelector('.qty-num').textContent = v.qty;
                            }
                        });
                        updateCartUI();
                    });
                });
            }

            // Order button
            document.getElementById('orderBtn').addEventListener('click', () => {
                const items = Object.values(cart);
                if (items.length === 0) return alert('Cart is empty');
                const tableNumber = document.getElementById('tableNumber').value.trim();
                if (!tableNumber) return alert('Please enter your table number');
                const customerName = document.getElementById('customerName').value.trim();
                const phone = cafe.whatsapp ? cafe.whatsapp.replace(/\D/g, '') : '';
                if (!phone) return alert('No WhatsApp number set');

                let msg = `🛎️ *Order from ${cafe.cafe_name}*\n`;
                msg += `📋 Table: ${tableNumber}\n`;
                if (customerName) msg += `👤 Name: ${customerName}\n`;
                msg += `\n📝 *Items:*\n`;
                msg += `━━━━━━━━━━━━━━━━\n`;
                items.forEach((item, idx) => {
                    const lineTotal = (item.price * item.qty).toFixed(2);
                    msg += `${idx+1}. ${item.name}${item.variantName && item.variantName !== item.name ? ' (' + item.variantName + ')' : ''}\n`;
                    msg += `   ${item.qty} × ₹${item.price} = ₹${lineTotal}\n`;
                });
                const total = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                msg += `━━━━━━━━━━━━━━━━\n`;
                msg += `💰 *Total: ₹${total}*\n`;
                msg += `\n🙏 Thank you!`;

                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            });

            // Share button
            document.getElementById('shareMenuBtn').addEventListener('click', () => {
                const menuUrl = window.location.href;
                if (navigator.share) {
                    navigator.share({ title: cafe.cafe_name, text: 'Check out our menu!', url: menuUrl }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(menuUrl).then(() => alert('Menu link copied!')).catch(() => {});
                }
            });
        }
    </script>
</body>
</html>
