<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Foodie Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --warm-red: #C0392B;
            --cream: #FDF3E0;
            --dark: #1A0F0A;
            --glass: rgba(20, 10, 10, 0.75);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192,57,43,0.1) 0%, transparent 50%);
            z-index: 0;
        }

        /* Food reveal animation */
        .food-reveal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease 0.8s, visibility 0.5s ease 0.8s;
        }
        .food-reveal.hidden { opacity: 0; visibility: hidden; }
        .dish {
            position: relative;
            width: 180px;
            height: 180px;
        }
        .plate {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: radial-gradient(circle at 50% 30%, #f0f0f0, #aaa);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .food-icon {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            animation: float 2s infinite alternate;
        }
        @keyframes float {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-10px); }
        }
        .steam {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: steam 1.5s infinite;
        }
        @keyframes steam {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0.8; }
            100% { transform: translateX(-50%) translateY(-30px) scale(1.2); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 7rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.9s, transform 0.6s ease 0.9s;
        }
        .container.visible { opacity: 1; transform: translateY(0); }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        .header img {
            width: 80px; height: 80px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 0.5rem;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }
        .header p { color: var(--cream); font-style: italic; }

        /* Category cards */
        .category {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 24px;
            padding: 1.3rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cat-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 0.3rem;
        }
        .item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 1rem;
            transition: background 0.2s;
            border-radius: 12px;
            padding: 0.8rem 0.4rem;
        }
        .item:hover { background: rgba(212,175,55,0.05); }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; }
        .item-desc { font-size: 0.85rem; opacity: 0.7; margin-top: 0.2rem; }

        /* Variant selector (radio buttons) */
        .variants {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.4rem;
        }
        .variant-option {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(212,175,55,0.15);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .variant-option.selected { background: var(--gold); color: var(--dark); font-weight: 600; }
        .variant-option input { display: none; }
        .price { font-weight: 700; color: var(--gold); margin-left: 0.5rem; }
        .add-btn {
            background: var(--gold);
            border: none;
            color: var(--dark);
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--gold);
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .add-btn:active { transform: scale(0.9); }

        /* Floating cart */
        #cartFloat {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--gold);
            color: var(--dark);
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 0 30px var(--gold);
            cursor: pointer;
            z-index: 20;
        }
        #cartPreview {
            display: none;
            position: fixed;
            bottom: 5.5rem;
            right: 1.5rem;
            width: 90%;
            max-width: 350px;
            background: rgba(10,5,5,0.95);
            backdrop-filter: blur(30px);
            padding: 1.3rem;
            border-radius: 24px;
            border: 2px solid var(--gold);
            z-index: 19;
        }
        #orderBtn {
            width: 100%;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 0.7rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Food reveal animation -->
    <div class="food-reveal" id="foodReveal">
        <div class="dish">
            <div class="plate"></div>
            <div class="food-icon">🍕</div>
            <div class="steam" style="margin-left:-15px;"></div>
            <div class="steam" style="margin-left:10px; animation-delay:0.5s;"></div>
        </div>
    </div>

    <div class="container" id="menuContent">
        <div class="header">
            <img id="logoImg" src="" alt="logo" style="display:none;" />
            <h1 id="cafeTitle"></h1>
            <p id="cafeDesc"></p>
        </div>
        <div id="menuList"></div>
    </div>

    <div id="cartFloat">🛒 <span id="cartCount">0</span></div>
    <div id="cartPreview">
        <h3>Your Order</h3>
        <ul id="cartItems"></ul>
        <p>Total: ₹<span id="cartTotal">0.00</span></p>
        <button id="orderBtn">Order via WhatsApp</button>
    </div>

    <script>
        // Reveal animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('foodReveal').classList.add('hidden');
                document.getElementById('menuContent').classList.add('visible');
            }, 2000);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://phunzwqocgtgnpsgvsyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBodW56d3FvY2d0Z25wc2d2c3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ2ODIsImV4cCI6MjA5NDA5MDY4Mn0.gWJ_NORZxMWz0EPJ425gDZew7MJUxWdo6L67snAE0dI';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            const { data: cafe, error } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (error || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            document.getElementById('cafeTitle').textContent = cafe.cafe_name;
            document.getElementById('cafeDesc').textContent = cafe.description;
            const logo = document.getElementById('logoImg');
            if (cafe.logo_url) { logo.src = cafe.logo_url; logo.style.display = 'block'; }

            const { data: items } = await client.from('menu_items').select('*').eq('cafe_id', cafeId).eq('available', true);
            const grouped = {};
            if (items) items.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            const menuList = document.getElementById('menuList');
            const cart = {};
            let selectedVariants = {}; // itemId -> selected variant index

            for (const [cat, catItems] of Object.entries(grouped)) {
                const section = document.createElement('div');
                section.className = 'category';
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;
                catItems.forEach(item => {
                    const hasVariants = item.description && item.description.startsWith('VAR::');
                    let variants = [];
                    if (hasVariants) {
                        const vStr = item.description.replace('VAR::', '');
                        const pairs = vStr.split('|');
                        pairs.forEach(p => {
                            const [name, price] = p.split('=');
                            variants.push({ name, price: parseFloat(price) });
                        });
                    }
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';
                    itemDiv.innerHTML = `
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${!hasVariants ? item.description : ''}</div>
                            ${hasVariants ? `<div class="variants" data-id="${item.id}">` + variants.map((v, idx) => `
                                <label class="variant-option ${idx === 0 ? 'selected' : ''}" data-index="${idx}">
                                    <input type="radio" name="variant_${item.id}" value="${idx}" ${idx === 0 ? 'checked' : ''} />
                                    ${v.name} <span class="price">₹${v.price}</span>
                                </label>
                            `).join('') + `</div>` : ''}
                        </div>
                        ${!hasVariants ? `<div class="price">₹${item.price}</div>` : ''}
                        <button class="add-btn" data-id="${item.id}" data-name="${item.name}" data-hasvariants="${hasVariants}">+</button>
                    `;
                    section.appendChild(itemDiv);
                });
                menuList.appendChild(section);
            }

            // Handle variant selection
            document.querySelectorAll('.variant-option').forEach(opt => {
                opt.addEventListener('click', function() {
                    const parent = this.parentNode;
                    const itemId = parent.dataset.id;
                    const index = parseInt(this.dataset.index);
                    parent.querySelectorAll('.variant-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedVariants[itemId] = index;
                });
            });

            // Add to cart
            document.addEventListener('click', (e) => {
                if (!e.target.classList.contains('add-btn')) return;
                const id = e.target.dataset.id;
                const name = e.target.dataset.name;
                const hasVariants = e.target.dataset.hasvariants === 'true';
                let price;
                let variantName = '';
                if (hasVariants) {
                    const variantEl = document.querySelector(`.variants[data-id="${id}"] .variant-option.selected`);
                    if (variantEl) {
                        const priceSpan = variantEl.querySelector('.price');
                        price = parseFloat(priceSpan.textContent.replace('₹', ''));
                        variantName = variantEl.textContent.split(' ')[0].trim();
                    } else {
                        // fallback to first variant
                        const firstVariant = document.querySelector(`.variants[data-id="${id}"] .variant-option`);
                        if (firstVariant) {
                            const priceSpan = firstVariant.querySelector('.price');
                            price = parseFloat(priceSpan.textContent.replace('₹', ''));
                            variantName = firstVariant.textContent.split(' ')[0].trim();
                        }
                    }
                } else {
                    price = parseFloat(e.target.parentNode.querySelector('.price').textContent.replace('₹', ''));
                }
                const cartKey = id + (variantName ? '_' + variantName : '');
                if (cart[cartKey]) cart[cartKey].qty++;
                else cart[cartKey] = { id, name, price, variant: variantName, qty: 1 };
                updateCartUI();
            });

            // Cart UI
            const cartFloat = document.getElementById('cartFloat');
            const cartPreview = document.getElementById('cartPreview');
            const cartCountEl = document.getElementById('cartCount');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            let cartVisible = false;
            cartFloat.addEventListener('click', () => {
                cartVisible = !cartVisible;
                cartPreview.style.display = cartVisible ? 'block' : 'none';
            });

            function updateCartUI() {
                const items = Object.values(cart);
                cartCountEl.textContent = items.reduce((s, i) => s + i.qty, 0);
                cartTotalEl.textContent = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                cartItemsEl.innerHTML = items.map((item, idx) => `
                    <li>
                        <span>${item.name}${item.variant ? ' (' + item.variant + ')' : ''} × ${item.qty}</span>
                        <span>₹${(item.price * item.qty).toFixed(2)}
                            <button class="remove-item" data-key="${Object.keys(cart)[idx]}">✕</button>
                        </span>
                    </li>
                `).join('');
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const key = e.target.dataset.key;
                        delete cart[key];
                        updateCartUI();
                    });
                });
            }

            document.getElementById('orderBtn').addEventListener('click', () => {
                const items = Object.values(cart);
                if (items.length === 0) return alert('Cart empty');
                const phone = cafe.whatsapp ? cafe.whatsapp.replace(/\D/g, '') : '';
                if (!phone) return alert('No WhatsApp number');
                let msg = `Order from ${cafe.cafe_name}:\n`;
                items.forEach((item, idx) => {
                    msg += `${idx+1}. ${item.name}${item.variant ? ' ('+item.variant+')' : ''} × ${item.qty} — ₹${(item.price*item.qty).toFixed(2)}\n`;
                });
                msg += `\nTotal: ₹${items.reduce((s,i) => s + i.price*i.qty, 0).toFixed(2)}`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            });
        }
    </script>
</body>
</html>
