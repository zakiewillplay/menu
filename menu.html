<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Foodie Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --warm-red: #C0392B;
            --cream: #FDF3E0;
            --dark: #1A0F0A;
            --glass: rgba(20, 10, 10, 0.75);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192,57,43,0.1) 0%, transparent 50%);
            z-index: 0;
        }
        .food-reveal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease 0.8s, visibility 0.5s ease 0.8s;
        }
        .food-reveal.hidden { opacity: 0; visibility: hidden; }
        .dish {
            position: relative;
            width: 180px;
            height: 180px;
        }
        .plate {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: radial-gradient(circle at 50% 30%, #f0f0f0, #aaa);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .food-icon {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            animation: float 2s infinite alternate;
        }
        @keyframes float {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-10px); }
        }
        .steam {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: steam 1.5s infinite;
        }
        @keyframes steam {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0.8; }
            100% { transform: translateX(-50%) translateY(-30px) scale(1.2); opacity: 0; }
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 7rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.9s, transform 0.6s ease 0.9s;
        }
        .container.visible { opacity: 1; transform: translateY(0); }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        .header img {
            width: 80px; height: 80px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 0.5rem;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }
        .header p { color: var(--cream); font-style: italic; }
        .category {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 24px;
            padding: 1.3rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cat-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 0.3rem;
        }
        .item-block {
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .item-name {
            font-weight: 600;
            font-size: 1.05rem;
        }
        .item-desc {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
        }
        .variant-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }
        .variant-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        .variant-label {
            flex: 1;
            font-weight: 600;
            color: var(--gold);
        }
        .variant-label small {
            font-weight: 400;
            color: #ccc;
            margin-left: 0.3rem;
        }
        .qty-box {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            background: rgba(212,175,55,0.15);
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .qty-btn:active { background: var(--gold); color: var(--dark); }
        .qty-num {
            min-width: 24px;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
        }
        .single-price {
            font-weight: 700;
            color: var(--gold);
            margin: 0 1rem;
        }
        .single-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Floating cart */
        #cartFloat {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            background: var(--gold);
            color: var(--dark);
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 0 30px var(--gold);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #cartPreview {
            display: none;
            position: fixed;
            bottom: 5.5rem;
            right: 1.5rem;
            width: 90%;
            max-width: 350px;
            background: rgba(10,5,5,0.95);
            backdrop-filter: blur(30px);
            padding: 1.3rem;
            border-radius: 24px;
            border: 2px solid var(--gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            z-index: 19;
        }
        #cartPreview h4 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 0.8rem; }
        #cartItems { list-style: none; margin: 0.5rem 0; max-height: 250px; overflow-y: auto; }
        #cartItems li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.5rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.3rem;
        }
        .remove-item { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 1rem; }
        #orderBtn {
            width: 100%;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 0.7rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="food-reveal" id="foodReveal">
        <div class="dish">
            <div class="plate"></div>
            <div class="food-icon">🍕</div>
            <div class="steam" style="margin-left:-15px;"></div>
            <div class="steam" style="margin-left:10px; animation-delay:0.5s;"></div>
        </div>
    </div>

    <div class="container" id="menuContent">
        <div class="header">
            <img id="logoImg" src="" alt="logo" style="display:none;" />
            <h1 id="cafeTitle"></h1>
            <p id="cafeDesc"></p>
        </div>
        <div id="menuList"></div>
    </div>

    <div id="cartFloat"><span>🛒</span> <span id="cartCount">0</span></div>
    <div id="cartPreview">
        <h4>Your Order</h4>
        <ul id="cartItems"></ul>
        <p style="color:var(--gold); font-weight:600;">Total: ₹<span id="cartTotal">0.00</span></p>
        <button id="orderBtn">Order via WhatsApp</button>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('foodReveal').classList.add('hidden');
                document.getElementById('menuContent').classList.add('visible');
            }, 2000);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://phunzwqocgtgnpsgvsyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBodW56d3FvY2d0Z25wc2d2c3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ2ODIsImV4cCI6MjA5NDA5MDY4Mn0.gWJ_NORZxMWz0EPJ425gDZew7MJUxWdo6L67snAE0dI';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            const { data: cafe, error } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (error || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            document.getElementById('cafeTitle').textContent = cafe.cafe_name || 'Our Menu';
            document.getElementById('cafeDesc').textContent = cafe.description || '';
            const logo = document.getElementById('logoImg');
            if (cafe.logo_url) { logo.src = cafe.logo_url; logo.style.display = 'block'; }

            const { data: items } = await client.from('menu_items').select('*').eq('cafe_id', cafeId).eq('available', true);
            const grouped = {};
            if (items) items.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            const menuList = document.getElementById('menuList');
            const cart = {}; // key: `${itemId}_${variantName}`

            // Build menu
            for (const [cat, catItems] of Object.entries(grouped)) {
                const section = document.createElement('div');
                section.className = 'category';
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;

                catItems.forEach(item => {
                    const hasVariants = item.description && item.description.startsWith('VAR::');
                    let variants = [];
                    if (hasVariants) {
                        const vStr = item.description.replace('VAR::', '');
                        vStr.split('|').forEach(p => {
                            const [name, price] = p.split('=');
                            if (name && price) variants.push({ name: name.trim(), price: parseFloat(price) });
                        });
                    } else {
                        variants = [{ name: item.name, price: parseFloat(item.price) }];
                    }

                    const block = document.createElement('div');
                    block.className = 'item-block';
                    block.dataset.itemId = item.id;
                    block.innerHTML = `
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${hasVariants ? '' : (item.description || '')}</div>
                    `;

                    if (variants.length > 1) {
                        // Multiple variants – each gets its own qty selector
                        const variantList = document.createElement('div');
                        variantList.className = 'variant-list';
                        variants.forEach(v => {
                            const vRow = document.createElement('div');
                            vRow.className = 'variant-row';
                            vRow.dataset.variantName = v.name;
                            vRow.innerHTML = `
                                <span class="variant-label">${v.name} <small>₹${v.price}</small></span>
                                <div class="qty-box">
                                    <button class="qty-btn qty-dec">−</button>
                                    <span class="qty-num">0</span>
                                    <button class="qty-btn qty-inc">+</button>
                                </div>
                            `;
                            variantList.appendChild(vRow);
                        });
                        block.appendChild(variantList);
                    } else {
                        // Single price (or single variant) – single qty selector
                        const singleVariant = variants[0];
                        const singleRow = document.createElement('div');
                        singleRow.className = 'single-item-row';
                        singleRow.innerHTML = `
                            <span class="single-price">₹${singleVariant.price}</span>
                            <div class="qty-box">
                                <button class="qty-btn qty-dec">−</button>
                                <span class="qty-num">0</span>
                                <button class="qty-btn qty-inc">+</button>
                            </div>
                        `;
                        block.appendChild(singleRow);
                        // Store variant info on the block for cart key
                        block.dataset.variantName = singleVariant.name;
                    }
                    section.appendChild(block);
                });
                menuList.appendChild(section);
            }

            // Update quantity display for a single variant within a block
            function updateVariantQty(block, variantName) {
                const itemId = block.dataset.itemId;
                const cartKey = `${itemId}_${variantName}`;
                const cartItem = cart[cartKey];
                const qty = cartItem ? cartItem.qty : 0;
                // Find the specific qty-num inside that variant row
                let qtySpan;
                if (block.querySelector('.variant-row')) {
                    // multiple variants
                    const rows = block.querySelectorAll('.variant-row');
                    for (const row of rows) {
                        if (row.dataset.variantName === variantName) {
                            qtySpan = row.querySelector('.qty-num');
                            break;
                        }
                    }
                } else {
                    // single variant
                    qtySpan = block.querySelector('.qty-num');
                }
                if (qtySpan) qtySpan.textContent = qty;
            }

            // Event delegation
            menuList.addEventListener('click', (e) => {
                const target = e.target;
                if (!target.classList.contains('qty-btn')) return;

                const btn = target;
                const isInc = btn.classList.contains('qty-inc');
                const isDec = btn.classList.contains('qty-dec');
                if (!isInc && !isDec) return;

                const qtyBox = btn.closest('.qty-box');
                if (!qtyBox) return;

                const block = btn.closest('.item-block');
                const itemId = block.dataset.itemId;
                const itemName = block.querySelector('.item-name').textContent;

                let variantName, price;
                // Check if it's a multi-variant row
                const variantRow = btn.closest('.variant-row');
                if (variantRow) {
                    variantName = variantRow.dataset.variantName;
                    const priceText = variantRow.querySelector('small').textContent.replace('₹', '');
                    price = parseFloat(priceText);
                } else {
                    // single variant
                    variantName = block.dataset.variantName || block.querySelector('.variant-label')?.textContent.trim() || itemName;
                    const priceEl = block.querySelector('.single-price');
                    price = priceEl ? parseFloat(priceEl.textContent.replace('₹', '')) : 0;
                }

                const cartKey = `${itemId}_${variantName}`;

                if (isInc) {
                    if (cart[cartKey]) {
                        cart[cartKey].qty++;
                    } else {
                        cart[cartKey] = {
                            id: itemId,
                            name: itemName,
                            variantName: variantName,
                            price: price,
                            qty: 1
                        };
                    }
                } else if (isDec) {
                    if (cart[cartKey]) {
                        cart[cartKey].qty--;
                        if (cart[cartKey].qty <= 0) delete cart[cartKey];
                    }
                }

                updateVariantQty(block, variantName);
                updateCartPreview();
            });

            // Cart preview
            const cartFloat = document.getElementById('cartFloat');
            const cartPreview = document.getElementById('cartPreview');
            const cartCountEl = document.getElementById('cartCount');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            let cartVisible = false;

            cartFloat.addEventListener('click', () => {
                cartVisible = !cartVisible;
                cartPreview.style.display = cartVisible ? 'block' : 'none';
            });

            function updateCartPreview() {
                const items = Object.values(cart);
                const totalQty = items.reduce((s, i) => s + i.qty, 0);
                cartCountEl.textContent = totalQty;
                const total = items.reduce((s, i) => s + i.price * i.qty, 0);
                cartTotalEl.textContent = total.toFixed(2);
                cartItemsEl.innerHTML = items.map((item, idx) => `
                    <li>
                        <span>${item.name} ${item.variantName ? '(' + item.variantName + ')' : ''} × ${item.qty}</span>
                        <span>₹${(item.price * item.qty).toFixed(2)}
                            <button class="remove-item" data-key="${Object.keys(cart)[idx]}">✕</button>
                        </span>
                    </li>
                `).join('');
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const key = e.target.dataset.key;
                        delete cart[key];
                        // update all block qty displays to 0 for that key
                        const [id, ...variantArr] = key.split('_');
                        const variantName = variantArr.join('_');
                        document.querySelectorAll('.item-block').forEach(b => {
                            if (b.dataset.itemId === id) {
                                updateVariantQty(b, variantName);
                            }
                        });
                        updateCartPreview();
                    });
                });
            }

            document.getElementById('orderBtn').addEventListener('click', () => {
                const items = Object.values(cart);
                if (items.length === 0) return alert('Cart is empty');
                const phone = cafe.whatsapp ? cafe.whatsapp.replace(/\D/g, '') : '';
                if (!phone) return alert('No WhatsApp number set');
                let msg = `🛎️ Order from ${cafe.cafe_name}:\n`;
                items.forEach((item, idx) => {
                    msg += `${idx+1}. ${item.name}${item.variantName ? ' (' + item.variantName + ')' : ''} × ${item.qty} — ₹${(item.price * item.qty).toFixed(2)}\n`;
                });
                msg += `\n💰 Total: ₹${items.reduce((s,i) => s + i.price*i.qty, 0).toFixed(2)}`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            });

            // Initial display
            document.querySelectorAll('.item-block').forEach(block => {
                const itemId = block.dataset.itemId;
                const variantRows = block.querySelectorAll('.variant-row');
                if (variantRows.length > 0) {
                    variantRows.forEach(row => {
                        const vName = row.dataset.variantName;
                        updateVariantQty(block, vName);
                    });
                } else {
                    const vName = block.dataset.variantName;
                    if (vName) updateVariantQty(block, vName);
                }
            });
        }
    </script>
</body>
</html>
