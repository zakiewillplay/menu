<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Royal Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E7B5;
            --burgundy: #6D1A2D;
            --cream: #FDFADC;
            --dark: #1A0F0A;
            --glass: rgba(20, 10, 10, 0.7);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 30% 20%, rgba(212,175,55,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 70% 80%, rgba(109,26,45,0.1) 0%, transparent 50%);
            z-index: 0;
        }

        /* ========== ENTRANCE ANIMATION ========== */
        /* Full‑screen overlay that reveals the menu */
        .reveal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .reveal-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .curtain {
            width: 100%;
            height: 100%;
            display: flex;
        }
        .curtain-left, .curtain-right {
            flex: 1;
            background: radial-gradient(circle at center, var(--burgundy) 0%, var(--dark) 90%);
            transform: scaleX(1);
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.18, 1);
            position: relative;
        }
        .curtain-left {
            border-right: 2px solid var(--gold);
            transform-origin: left;
        }
        .curtain-right {
            border-left: 2px solid var(--gold);
            transform-origin: right;
        }
        .reveal-overlay.hidden .curtain-left {
            transform: scaleX(0);
        }
        .reveal-overlay.hidden .curtain-right {
            transform: scaleX(0);
        }
        .crown-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--gold);
            z-index: 101;
            animation: pulse-crown 1.5s infinite;
            text-shadow: 0 0 20px var(--gold);
        }
        @keyframes pulse-crown {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        /* Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            animation: floatUp 2s linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 8rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.8s, transform 0.6s ease 0.8s;
        }
        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .royal-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2rem 1rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(212,175,55,0.25);
            position: relative;
            overflow: hidden;
        }
        .royal-header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(212,175,55,0.1), transparent 30%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .header-content { position: relative; z-index: 1; }
        .logo-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            box-shadow: 0 0 30px rgba(212,175,55,0.6);
            object-fit: cover;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212,175,55,0.5);
            letter-spacing: 2px;
            margin: 0.3rem 0;
        }
        .cafe-desc { color: var(--gold-light); font-size: 0.95rem; opacity: 0.85; font-style: italic; margin-top: 0.2rem; }
        .ornament {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 0.5rem 0;
        }
        .category {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 24px;
            padding: 1.3rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 12px 35px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .category:hover { transform: scale(1.01); }
        .cat-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 0.4rem;
        }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 0.4rem;
            transition: background 0.2s;
            border-radius: 12px;
        }
        .item-row:hover { background: rgba(212,175,55,0.05); }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; }
        .item-desc { font-size: 0.8rem; opacity: 0.6; margin-top: 0.15rem; }
        .item-price { font-weight: 700; color: var(--gold); margin: 0 0.5rem; white-space: nowrap; font-size: 1rem; }
        .qty-selector { display: flex; align-items: center; gap: 0.2rem; }
        .qty-btn {
            background: rgba(212,175,55,0.15);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 30px; height: 30px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .qty-btn:active { background: var(--gold); color: var(--dark); }
        .qty-num { min-width: 24px; text-align: center; font-weight: 600; font-size: 0.9rem; }
        #cartFloat {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            background: linear-gradient(135deg, var(--gold), #b8922e);
            color: var(--dark);
            padding: 0.9rem 2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 0 40px rgba(212,175,55,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--gold-light);
        }
        #cartPreview {
            display: none;
            position: fixed;
            bottom: 6rem;
            right: 1.5rem;
            width: 90%;
            max-width: 350px;
            background: rgba(10,5,5,0.9);
            backdrop-filter: blur(30px);
            padding: 1.3rem;
            border-radius: 24px;
            border: 2px solid var(--gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 19;
        }
        #cartPreview h4 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 0.8rem; }
        #cartItems { list-style: none; margin: 0.5rem 0; max-height: 250px; overflow-y: auto; }
        #cartItems li { display: flex; justify-content: space-between; align-items: center; margin: 0.5rem 0; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.3rem; }
        .remove-item { background: none; border: none; color: var(--gold-light); cursor: pointer; font-size: 1rem; }
        #orderBtn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #b8922e);
            color: var(--dark);
            border: none;
            padding: 0.7rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 0.8rem;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(212,175,55,0.5);
        }
    </style>
</head>
<body>
    <!-- Entrance Animation Overlay -->
    <div class="reveal-overlay" id="revealOverlay">
        <div class="curtain">
            <div class="curtain-left"></div>
            <div class="curtain-right"></div>
        </div>
        <div class="crown-icon">👑</div>
        <!-- Generate a few gold particles -->
        <div id="particlesContainer" style="position:absolute; inset:0; overflow:hidden;"></div>
    </div>

    <div class="container" id="menuContent">
        <div id="cafeHeader" class="royal-header">
            <div class="header-content">
                <img id="logoImage" class="logo-img" src="" alt="Logo" style="display:none;" />
                <h1 id="cafeTitle"></h1>
                <p id="cafeDesc" class="cafe-desc"></p>
                <div class="ornament"></div>
            </div>
        </div>
        <div id="menuContainer"></div>
    </div>

    <div id="cartFloat">
        <span>🛒</span> <span id="cartCount">0</span>
    </div>
    <div id="cartPreview">
        <h4>Your Order</h4>
        <ul id="cartItems"></ul>
        <p style="color:var(--gold); font-weight:600;">Total: ₹<span id="cartTotal">0.00</span></p>
        <button id="orderBtn">Order via WhatsApp</button>
    </div>

    <!-- Entrance animation script -->
    <script>
        // Create floating gold particles
        const particlesContainer = document.getElementById('particlesContainer');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 2 + 's';
            particlesContainer.appendChild(particle);
        }

        // After 2.5 seconds, hide the overlay and show the menu
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('revealOverlay').classList.add('hidden');
                document.getElementById('menuContent').classList.add('visible');
            }, 2500); // adjust time as needed
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://phunzwqocgtgnpsgvsyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBodW56d3FvY2d0Z25wc2d2c3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ2ODIsImV4cCI6MjA5NDA5MDY4Mn0.gWJ_NORZxMWz0EPJ425gDZew7MJUxWdo6L67snAE0dI';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            const { data: cafe, error } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (error || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            document.getElementById('cafeTitle').textContent = cafe.cafe_name || 'Cafe Menu';
            document.getElementById('cafeDesc').textContent = cafe.description || '';
            const logoImg = document.getElementById('logoImage');
            if (cafe.logo_url) {
                logoImg.src = cafe.logo_url;
                logoImg.style.display = 'block';
            }

            const { data: items } = await client.from('menu_items').select('*').eq('cafe_id', cafeId).eq('available', true);
            const grouped = {};
            if (items) items.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            const container = document.getElementById('menuContainer');
            const cart = {};

            for (const [cat, catItems] of Object.entries(grouped)) {
                const section = document.createElement('div');
                section.className = 'category';
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;
                catItems.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item-row';
                    itemDiv.innerHTML = `
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${item.description || ''}</div>
                        </div>
                        <div class="item-price">₹${item.price}</div>
                        <div class="qty-selector" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">
                            <button class="qty-btn dec">−</button>
                            <span class="qty-num">0</span>
                            <button class="qty-btn inc">+</button>
                        </div>
                    `;
                    section.appendChild(itemDiv);
                });
                container.appendChild(section);
            }

            container.addEventListener('click', (e) => {
                const btn = e.target;
                if (!btn.classList.contains('qty-btn')) return;
                const selector = btn.closest('.qty-selector');
                const id = selector.dataset.id;
                const name = selector.dataset.name;
                const price = parseFloat(selector.dataset.price);
                const qtySpan = selector.querySelector('.qty-num');
                let currentQty = cart[id] ? cart[id].qty : 0;

                if (btn.classList.contains('inc')) currentQty++;
                else if (btn.classList.contains('dec')) currentQty = Math.max(0, currentQty - 1);

                if (currentQty === 0) delete cart[id];
                else cart[id] = { name, price, qty: currentQty };
                qtySpan.textContent = currentQty;
                updateCartUI();
            });

            const cartFloat = document.getElementById('cartFloat');
            const cartPreview = document.getElementById('cartPreview');
            const cartCountEl = document.getElementById('cartCount');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            let cartVisible = false;

            cartFloat.addEventListener('click', () => {
                cartVisible = !cartVisible;
                cartPreview.style.display = cartVisible ? 'block' : 'none';
            });

            function updateCartUI() {
                const items = Object.values(cart);
                cartCountEl.textContent = items.reduce((sum, i) => sum + i.qty, 0);
                cartTotalEl.textContent = items.reduce((sum, i) => sum + i.price * i.qty, 0).toFixed(2);
                cartItemsEl.innerHTML = items.map((item, idx) => `
                    <li>
                        <span>${idx+1}. ${item.name} × ${item.qty}</span>
                        <span style="color:var(--gold);">₹${(item.price * item.qty).toFixed(2)}
                            <button class="remove-item" data-id="${Object.keys(cart)[idx]}">✕</button>
                        </span>
                    </li>
                `).join('');
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.id;
                        delete cart[id];
                        const selector = document.querySelector(`.qty-selector[data-id="${id}"]`);
                        if (selector) selector.querySelector('.qty-num').textContent = '0';
                        updateCartUI();
                    });
                });
            }

            document.getElementById('orderBtn').addEventListener('click', () => {
                const items = Object.values(cart);
                if (items.length === 0) return alert('Cart is empty');
                const phone = cafe.whatsapp ? cafe.whatsapp.replace(/\D/g, '') : '';
                if (!phone) return alert('No WhatsApp number set.');
                let message = `🛎️ Order from ${cafe.cafe_name}:\n`;
                items.forEach((item, idx) => {
                    message += `${idx+1}. ${item.name} × ${item.qty} — ₹${(item.price * item.qty).toFixed(2)}\n`;
                });
                const total = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                message += `\n💰 Total: ₹${total}`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            });
        }
    </script>
</body>
</html>
