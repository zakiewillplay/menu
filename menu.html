<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cafe Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            --primary: #FF6B35;
            --accent: #2F3E46;
            font-family: 'Inter', sans-serif;
            background: var(--accent);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,107,53,0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,107,53,0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 15s linear infinite;
            z-index: 0;
        }
        @keyframes gridMove {
            0% { transform: translate(0,0); }
            100% { transform: translate(50px,50px); }
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 7rem;
        }
        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,107,53,0.4);
            box-shadow: 0 0 30px rgba(255,107,53,0.2);
        }
        header img {
            width: 70px; height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
        }
        header h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--primary);
        }
        .desc { font-size: 0.9rem; opacity: 0.8; margin-top: 0.2rem; }
        .category {
            background: rgba(10,10,10,0.6);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,107,53,0.25);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            transition: transform 0.3s;
        }
        .category:hover { transform: scale(1.01); }
        .cat-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.3rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 0.4rem;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
            border-radius: 10px;
        }
        .item:hover { background: rgba(255,107,53,0.08); }
        .item-info { flex:1; }
        .item-name { font-weight: 600; }
        .item-desc { font-size: 0.8rem; opacity: 0.55; margin-top: 0.2rem; }
        .price {
            font-weight: 700;
            color: var(--primary);
            margin: 0 1rem;
            font-size: 1.1rem;
            text-shadow: 0 0 6px var(--primary);
        }
        .add-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 38px; height: 38px;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary);
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .add-btn:active { transform: scale(0.85); box-shadow: 0 0 30px var(--primary); }
        #cartFloat {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 10;
            background: var(--primary);
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 0 35px rgba(255,107,53,0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        #cartPreview {
            display: none;
            position: fixed;
            bottom: 5.5rem;
            right: 1.5rem;
            width: 90%;
            max-width: 350px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(30px);
            padding: 1.3rem;
            border-radius: 20px;
            border: 1px solid var(--primary);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            z-index: 11;
        }
        #cartItems { list-style: none; margin: 0.5rem 0; }
        #cartItems li { display: flex; justify-content: space-between; margin: 0.4rem 0; font-size: 0.9rem; }
        #orderBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem;
            width: 100%;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 0.8rem;
            cursor: pointer;
            box-shadow: 0 0 25px var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header id="cafeHeader"></header>
        <div id="menuContainer"></div>
    </div>

    <div id="cartFloat">🛒 <span id="cartCount">0</span></div>
    <div id="cartPreview">
        <h4>Your Order</h4>
        <ul id="cartItems"></ul>
        <p><strong>Total: ₹<span id="cartTotal">0.00</span></strong></p>
        <button id="orderBtn">Order via WhatsApp</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://phunzwqocgtgnpsgvsyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBodW56d3FvY2d0Z25wc2d2c3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ2ODIsImV4cCI6MjA5NDA5MDY4Mn0.gWJ_NORZxMWz0EPJ425gDZew7MJUxWdo6L67snAE0dI';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            const { data: cafe, error } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (error || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            document.documentElement.style.setProperty('--primary', cafe.primary_color || '#FF6B35');
            document.documentElement.style.setProperty('--accent', cafe.accent_color || '#2F3E46');

            document.getElementById('cafeHeader').innerHTML = `
                ${cafe.logo_url ? `<img src="${cafe.logo_url}" alt="logo" />` : ''}
                <div>
                    <h1>${cafe.cafe_name}</h1>
                    <p class="desc">${cafe.description || ''}</p>
                </div>
            `;

            const { data: items } = await client.from('menu_items').select('*').eq('cafe_id', cafeId).eq('available', true);
            const grouped = {};
            if (items) items.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            const container = document.getElementById('menuContainer');
            for (const [cat, catItems] of Object.entries(grouped)) {
                const section = document.createElement('div');
                section.className = 'category';
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;
                catItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
                        </div>
                        <div class="price">₹${item.price}</div>
                        <button class="add-btn" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">+</button>
                    `;
                    section.appendChild(div);
                });
                container.appendChild(section);
            }

            // Cart
            const cart = [];
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            const cartPreview = document.getElementById('cartPreview');
            let cartVisible = false;

            document.getElementById('cartFloat').addEventListener('click', () => {
                cartVisible = !cartVisible;
                cartPreview.style.display = cartVisible ? 'block' : 'none';
            });

            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('add-btn')) {
                    const { id, name, price } = e.target.dataset;
                    const existing = cart.find(i => i.id === id);
                    if (existing) existing.qty++;
                    else cart.push({ id, name, price: parseFloat(price), qty: 1 });
                    updateCartUI();
                }
            });

            function updateCartUI() {
                cartCount.textContent = cart.reduce((s, i) => s + i.qty, 0);
                cartTotal.textContent = cart.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                cartItems.innerHTML = cart.map((item, idx) => `
                    <li>${idx+1}. ${item.name} x${item.qty} - ₹${(item.price*item.qty).toFixed(2)}</li>
                `).join('');
            }

            document.getElementById('orderBtn').addEventListener('click', () => {
                if (cart.length === 0) return alert('Cart is empty');
                const phone = cafe.whatsapp ? cafe.whatsapp.replace(/\D/g, '') : '';
                if (!phone) return alert('This cafe has no WhatsApp number set.');
                let message = `Order from ${cafe.cafe_name}:\n`;
                cart.forEach((item, idx) => {
                    message += `${idx+1}. ${item.name} x${item.qty} - ₹${(item.price*item.qty).toFixed(2)}\n`;
                });
                const total = cart.reduce((s, i) => s + i.price*i.qty, 0).toFixed(2);
                message += `\nTotal: ₹${total}`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            });
        }
    </script>
</body>
</html>
