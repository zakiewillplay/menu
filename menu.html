<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Foodie Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --warm-red: #C0392B;
            --cream: #FDF3E0;
            --dark: #1A0F0A;
            --glass: rgba(20, 10, 10, 0.75);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192,57,43,0.1) 0%, transparent 50%);
            z-index: 0;
        }

        /* Food reveal animation */
        .food-reveal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease 0.8s, visibility 0.5s ease 0.8s;
        }
        .food-reveal.hidden { opacity: 0; visibility: hidden; }
        .dish {
            position: relative;
            width: 180px;
            height: 180px;
        }
        .plate {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: radial-gradient(circle at 50% 30%, #f0f0f0, #aaa);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .food-icon {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            animation: float 2s infinite alternate;
        }
        @keyframes float {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-10px); }
        }
        .steam {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: steam 1.5s infinite;
        }
        @keyframes steam {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0.8; }
            100% { transform: translateX(-50%) translateY(-30px) scale(1.2); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 7rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.9s, transform 0.6s ease 0.9s;
        }
        .container.visible { opacity: 1; transform: translateY(0); }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        .header img {
            width: 80px; height: 80px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 0.5rem;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }
        .header p { color: var(--cream); font-style: italic; }

        /* Category cards */
        .category {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 24px;
            padding: 1.3rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cat-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 0.3rem;
        }

        /* Item row */
        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 0.5rem;
            transition: background 0.2s;
            border-radius: 12px;
        }
        .item:hover { background: rgba(212,175,55,0.05); }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; }
        .item-desc { font-size: 0.85rem; opacity: 0.7; margin-top: 0.2rem; }

        /* Variant chips */
        .variants {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .variant-chip {
            background: rgba(212,175,55,0.15);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 0.3rem 0.9rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gold);
            transition: all 0.2s;
        }
        .variant-chip.active {
            background: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 10px var(--gold);
        }

        .current-price {
            font-weight: 700;
            color: var(--gold);
            font-size: 1rem;
            margin-left: 0.5rem;
            white-space: nowrap;
        }

        /* Quantity selector */
        .qty-box {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            background: rgba(212,175,55,0.15);
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .qty-btn:active { background: var(--gold); color: var(--dark); }
        .qty-num {
            min-width: 24px;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
        }

        /* Floating cart */
        #cartFloat {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            background: var(--gold);
            color: var(--dark);
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 0 30px var(--gold);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #cartPreview {
            display: none;
            position: fixed;
            bottom: 5.5rem;
            right: 1.5rem;
            width: 90%;
            max-width: 350px;
            background: rgba(10,5,5,0.95);
            backdrop-filter: blur(30px);
            padding: 1.3rem;
            border-radius: 24px;
            border: 2px solid var(--gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            z-index: 19;
        }
        #cartPreview h4 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 0.8rem; }
        #cartItems { list-style: none; margin: 0.5rem 0; max-height: 250px; overflow-y: auto; }
        #cartItems li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.5rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.3rem;
        }
        .remove-item { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 1rem; }
        #orderBtn {
            width: 100%;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 0.7rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Food reveal animation overlay -->
    <div class="food-reveal" id="foodReveal">
        <div class="dish">
            <div class="plate"></div>
            <div class="food-icon">🍕</div>
            <div class="steam" style="margin-left:-15px;"></div>
            <div class="steam" style="margin-left:10px; animation-delay:0.5s;"></div>
        </div>
    </div>

    <div class="container" id="menuContent">
        <div class="header">
            <img id="logoImg" src="" alt="logo" style="display:none;" />
            <h1 id="cafeTitle"></h1>
            <p id="cafeDesc"></p>
        </div>
        <div id="menuList"></div>
    </div>

    <div id="cartFloat"><span>🛒</span> <span id="cartCount">0</span></div>
    <div id="cartPreview">
        <h4>Your Order</h4>
        <ul id="cartItems"></ul>
        <p style="color:var(--gold); font-weight:600;">Total: ₹<span id="cartTotal">0.00</span></p>
        <button id="orderBtn">Order via WhatsApp</button>
    </div>

    <script>
        // --- Reveal animation ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('foodReveal').classList.add('hidden');
                document.getElementById('menuContent').classList.add('visible');
            }, 2000);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://phunzwqocgtgnpsgvsyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBodW56d3FvY2d0Z25wc2d2c3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ2ODIsImV4cCI6MjA5NDA5MDY4Mn0.gWJ_NORZxMWz0EPJ425gDZew7MJUxWdo6L67snAE0dI';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            const { data: cafe, error } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (error || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            // Header
            document.getElementById('cafeTitle').textContent = cafe.cafe_name || 'Our Menu';
            document.getElementById('cafeDesc').textContent = cafe.description || '';
            const logo = document.getElementById('logoImg');
            if (cafe.logo_url) { logo.src = cafe.logo_url; logo.style.display = 'block'; }

            const { data: items } = await client.from('menu_items').select('*').eq('cafe_id', cafeId).eq('available', true);
            const grouped = {};
            if (items) items.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            const menuList = document.getElementById('menuList');
            // Cart object: key = `${itemId}_${variantName}` -> { id, name, price, qty }
            const cart = {};

            // Build menu
            for (const [cat, catItems] of Object.entries(grouped)) {
                const section = document.createElement('div');
                section.className = 'category';
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;

                catItems.forEach(item => {
                    const hasVariants = item.description && item.description.startsWith('VAR::');
                    const variants = [];
                    if (hasVariants) {
                        const vStr = item.description.replace('VAR::', '');
                        vStr.split('|').forEach(p => {
                            const [name, price] = p.split('=');
                            variants.push({ name: name.trim(), price: parseFloat(price) });
                        });
                    } else {
                        variants.push({ name: item.name, price: parseFloat(item.price) }); // single variant
                    }

                    const row = document.createElement('div');
                    row.className = 'item';

                    // Build variant chips HTML
                    let variantChipsHTML = '';
                    if (variants.length > 1) {
                        variants.forEach((v, idx) => {
                            variantChipsHTML += `
                                <span class="variant-chip ${idx === 0 ? 'active' : ''}" data-variant-index="${idx}">
                                    ${v.name} <span class="v-price">₹${v.price}</span>
                                </span>`;
                        });
                    }

                    // Current price display (updates based on selected variant)
                    const currentPrice = variants[0].price;

                    row.innerHTML = `
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${hasVariants ? '' : (item.description || '')}</div>
                            ${variants.length > 1 ? `<div class="variants">${variantChipsHTML}</div>` : ''}
                        </div>
                        <div class="current-price">₹${currentPrice}</div>
                        <div class="qty-box">
                            <button class="qty-btn qty-dec">−</button>
                            <span class="qty-num">0</span>
                            <button class="qty-btn qty-inc">+</button>
                        </div>
                    `;

                    // Store item data on the row
                    row.dataset.itemId = item.id;
                    row.dataset.itemName = item.name;
                    row.dataset.hasVariants = hasVariants;
                    // Attach variant data for easy access
                    row.__variants = variants;

                    section.appendChild(row);
                });
                menuList.appendChild(section);
            }

            // Update the quantity display for a specific row
            function updateQtyUI(row) {
                const itemId = row.dataset.itemId;
                const variants = row.__variants;
                const activeChip = row.querySelector('.variant-chip.active');
                const selectedIndex = activeChip ? parseInt(activeChip.dataset.variantIndex) : 0;
                const variant = variants[selectedIndex];
                const cartKey = `${itemId}_${variant.name}`;
                const cartItem = cart[cartKey];
                const qty = cartItem ? cartItem.qty : 0;
                row.querySelector('.qty-num').textContent = qty;
                // update price display
                row.querySelector('.current-price').textContent = `₹${variant.price}`;
            }

            // Event delegation for variant chip clicks and quantity buttons
            menuList.addEventListener('click', (e) => {
                const target = e.target;
                const row = target.closest('.item');
                if (!row) return;

                // Variant chip click
                if (target.classList.contains('variant-chip')) {
                    // Remove active from siblings
                    row.querySelectorAll('.variant-chip').forEach(chip => chip.classList.remove('active'));
                    target.classList.add('active');
                    // Update quantity display for the new selected variant
                    updateQtyUI(row);
                }

                // Quantity decrease
                if (target.classList.contains('qty-dec')) {
                    const itemId = row.dataset.itemId;
                    const variants = row.__variants;
                    const activeChip = row.querySelector('.variant-chip.active');
                    const selectedIndex = activeChip ? parseInt(activeChip.dataset.variantIndex) : 0;
                    const variant = variants[selectedIndex];
                    const cartKey = `${itemId}_${variant.name}`;
                    if (cart[cartKey]) {
                        cart[cartKey].qty--;
                        if (cart[cartKey].qty <= 0) delete cart[cartKey];
                        updateQtyUI(row);
                        updateCartPreview();
                    }
                }

                // Quantity increase
                if (target.classList.contains('qty-inc')) {
                    const itemId = row.dataset.itemId;
                    const itemName = row.dataset.itemName;
                    const variants = row.__variants;
                    const activeChip = row.querySelector('.variant-chip.active');
                    const selectedIndex = activeChip ? parseInt(activeChip.dataset.variantIndex) : 0;
                    const variant = variants[selectedIndex];
                    const cartKey = `${itemId}_${variant.name}`;
                    if (cart[cartKey]) {
                        cart[cartKey].qty++;
                    } else {
                        cart[cartKey] = {
                            id: itemId,
                            name: itemName,
                            variantName: variant.name,
                            price: variant.price,
                            qty: 1
                        };
                    }
                    updateQtyUI(row);
                    updateCartPreview();
                }
            });

            // Cart preview
            const cartFloat = document.getElementById('cartFloat');
            const cartPreview = document.getElementById('cartPreview');
            const cartCountEl = document.getElementById('cartCount');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            let cartVisible = false;

            cartFloat.addEventListener('click', () => {
                cartVisible = !cartVisible;
                cartPreview.style.display = cartVisible ? 'block' : 'none';
            });

            function updateCartPreview() {
                const items = Object.values(cart);
                const totalQty = items.reduce((sum, item) => sum + item.qty, 0);
                cartCountEl.textContent = totalQty;
                const total = items.reduce((sum, item) => sum + item.price * item.qty, 0);
                cartTotalEl.textContent = total.toFixed(2);
                cartItemsEl.innerHTML = items.map((item, idx) => `
                    <li>
                        <span>${item.name}${item.variantName ? ' (' + item.variantName + ')' : ''} × ${item.qty}</span>
                        <span>₹${(item.price * item.qty).toFixed(2)}
                            <button class="remove-item" data-key="${Object.keys(cart)[idx]}">✕</button>
                        </span>
                    </li>
                `).join('');
                // Attach remove listeners
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const key = e.target.dataset.key;
                        delete cart[key];
                        // Update all rows Qty displays
                        document.querySelectorAll('.item').forEach(row => {
                            updateQtyUI(row);
                        });
                        updateCartPreview();
                    });
                });
            }

            // Order button
            document.getElementById('orderBtn').addEventListener('click', () => {
                const items = Object.values(cart);
                if (items.length === 0) return alert('Cart is empty');
                const phone = cafe.whatsapp ? cafe.whatsapp.replace(/\D/g, '') : '';
                if (!phone) return alert('No WhatsApp number set');
                let msg = `🛎️ Order from ${cafe.cafe_name}:\n`;
                items.forEach((item, idx) => {
                    msg += `${idx+1}. ${item.name}${item.variantName ? ' (' + item.variantName + ')' : ''} × ${item.qty} — ₹${(item.price * item.qty).toFixed(2)}\n`;
                });
                const total = items.reduce((s, i) => s + i.price*i.qty, 0).toFixed(2);
                msg += `\n💰 Total: ₹${total}`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            });

            // Initial UI update for all rows
            document.querySelectorAll('.item').forEach(row => updateQtyUI(row));
        }
    </script>
</body>
</html>
