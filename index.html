<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Crafter – Lazy Edition ✨</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #ffffff;
      --bg-card: #f5f3ff;
      --text: #1e1b4b;
      --muted: #6b7280;
      --radius: 12px;
    }
    .dark {
      --bg: #111827;
      --bg-card: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 750px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
    }
    .hero { text-align: center; margin-bottom: 2rem; position: relative; }
    .hero h1 { font-size: 2rem; }
    .lead { color: var(--muted); }
    .dark-toggle { position: absolute; top: 0; right: 0; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    .card { background: var(--bg-card); border-radius: var(--radius); padding: 1.8rem; margin-bottom: 2rem; box-shadow: 0 4px 14px rgba(0,0,0,0.05); }
    h2 { margin: 1.5rem 0 0.5rem; font-size: 1.2rem; }
    label { display: block; font-weight: 600; margin: 1rem 0 0.2rem; }
    .sublabel { font-weight: normal; font-size: 0.9rem; color: var(--muted); }
    input, select, textarea {
      width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 6px;
      font-size: 1rem; font-family: inherit; background: var(--bg); color: var(--text);
    }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.6rem 1.2rem; margin-top: 0.3rem; }
    .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 0.3rem; margin: 0; }
    button {
      background: var(--primary); color: white; border: none;
      padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600;
      cursor: pointer; min-height: 48px; font-size: 1rem;
    }
    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.6; }
    .secondary-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .secondary-btn:hover { background: #e0e7ff; }
    .button-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem; }
    .output {
      background: var(--bg); border: 1px solid #ddd; border-radius: 6px;
      padding: 1.5rem; white-space: pre-wrap; font-family: monospace; max-height: 400px; overflow-y: auto;
    }
    .conditional { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s, opacity 0.3s; }
    .conditional.show { max-height: 6000px; opacity: 1; }
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; background: #10b981; color: white;
      padding: 0.75rem 1.5rem; border-radius: 6px; opacity: 0; transform: translateY(20px);
      transition: 0.3s; pointer-events: none; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .review-panel { margin-top: 1rem; padding: 1rem; background: var(--bg); border: 1px solid #ddd; border-radius: 6px; display: none; }
    .review-panel.show { display: block; }
    .review-rating { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  </style>
</head>
<body>
  <header class="hero">
    <button class="dark-toggle" onclick="toggleDark()">🌓</button>
    <h1>✨ Prompt Crafter (Lazy Edition)</h1>
    <p class="lead">Mostly tick boxes, barely any typing. Still perfect prompts.</p>
  </header>

  <section class="card">
    <!-- Type -->
    <label for="type">1. What do you want to create?</label>
    <select id="type">
      <option value="">-- Choose --</option>
      <option value="Website">Website</option>
      <option value="Web App">Web App</option>
      <option value="Video">Video</option>
      <option value="Image / Graphic">Image / Graphic</option>
    </select>

    <!-- Goal (only short text) -->
    <label for="goal">2. In one short sentence, what’s it for?</label>
    <textarea id="goal" rows="2" placeholder="e.g. A portfolio site for a lehenga boutique"></textarea>

    <!-- ============ WEBSITE ============ -->
    <div id="websiteQ" class="conditional">
      <hr><h2>🌐 Website (tick what you need)</h2>

      <label for="webName">Business name</label>
      <input type="text" id="webName" placeholder="Ms Lehanga">

      <label>Industry</label>
      <select id="webIndustry">
        <option value="">-- Pick --</option>
        <option value="Fashion">Fashion</option>
        <option value="Food">Food</option>
        <option value="Technology">Technology</option>
        <option value="Health">Health</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
      </select>

      <label>Target audience (tick all that apply)</label>
      <div class="checkbox-group" id="audienceCheckboxes">
        <label><input type="checkbox" value="Everyone"> Everyone</label>
        <label><input type="checkbox" value="Women"> Women</label>
        <label><input type="checkbox" value="Men"> Men</label>
        <label><input type="checkbox" value="Brides"> Brides</label>
        <label><input type="checkbox" value="Grooms"> Grooms</label>
        <label><input type="checkbox" value="Local customers"> Local customers</label>
      </div>

      <label for="webLocation">Location (city, region)</label>
      <input type="text" id="webLocation" placeholder="Kupwara, Jammu & Kashmir">

      <label>Main goal for visitors</label>
      <select id="webGoalAction">
        <option value="">-- Pick --</option>
        <option value="purchase">Buy / Purchase</option>
        <option value="booking">Book appointment</option>
        <option value="contact">Get in touch</option>
        <option value="subscribe">Subscribe</option>
        <option value="learn">Learn more</option>
      </select>

      <label for="webTagline">Tagline (optional)</label>
      <input type="text" id="webTagline" placeholder="Elegance woven in every thread">

      <label>Pages / sections you want</label>
      <div class="checkbox-group" id="pagesCheckboxes">
        <label><input type="checkbox" value="Home"> Home</label>
        <label><input type="checkbox" value="About"> About</label>
        <label><input type="checkbox" value="Gallery"> Gallery</label>
        <label><input type="checkbox" value="Booking"> Booking</label>
        <label><input type="checkbox" value="Contact"> Contact</label>
        <label><input type="checkbox" value="Testimonials"> Testimonials</label>
      </div>

      <label>Special features</label>
      <div class="checkbox-group" id="featuresCheckboxes">
        <label><input type="checkbox" value="booking system"> Booking system</label>
        <label><input type="checkbox" value="image gallery"> Image gallery</label>
        <label><input type="checkbox" value="contact form"> Contact form</label>
        <label><input type="checkbox" value="Google Maps"> Google Maps</label>
      </div>

      <label>Colour vibe</label>
      <select id="webColors">
        <option value="">-- Pick --</option>
        <option value="soft pastels">Soft pastels</option>
        <option value="warm earth tones">Warm earth tones</option>
        <option value="dark & elegant">Dark & elegant</option>
        <option value="bright & bold">Bright & bold</option>
        <option value="minimal black & white">Minimal B&W</option>
      </select>

      <label>Typography preference</label>
      <select id="webFonts">
        <option value="">-- Pick --</option>
        <option value="elegant serif">Elegant serif (Playfair Display)</option>
        <option value="clean sans-serif">Clean sans‑serif (Lato)</option>
        <option value="modern monospace">Modern monospace</option>
      </select>

      <label for="webInspiration">Inspiration website (URL or name)</label>
      <input type="text" id="webInspiration" placeholder="apple.com, tartinebakery.com">

      <!-- Social links -->
      <label>Your social / business links</label>
      <input type="text" id="instagram" placeholder="Instagram URL (optional)">
      <input type="text" id="facebook" placeholder="Facebook URL (optional)" style="margin-top:0.5rem;">
      <input type="text" id="googleBusiness" placeholder="Google Business link (optional)" style="margin-top:0.5rem;">

      <label>Layout</label>
      <select id="webLayoutStructure">
        <option value="single-page">Single scrolling page</option>
        <option value="multi-page">Multiple pages</option>
      </select>

      <label>Responsive behaviour</label>
      <select id="webResponsive">
        <option value="mobile-first">Mobile‑first (breakpoint 768px)</option>
        <option value="desktop-first">Desktop‑first</option>
      </select>
    </div>

    <!-- ============ WEB APP (simplified) ============ -->
    <div id="appQ" class="conditional">
      <hr><h2>📱 Web App</h2>
      <label for="appName">App name</label><input type="text" id="appName" placeholder="My App">
      <label>Problem it solves</label><input type="text" id="appProblem" placeholder="helps people...">
      <label>Target users</label><input type="text" id="appAudience" placeholder="everyone">
      <label>Core features</label><textarea id="appFeatures" rows="2" placeholder="login, dashboard, notifications"></textarea>
      <label>Design style</label><input type="text" id="appDesign" placeholder="clean, minimal">
      <label>Technologies</label><input type="text" id="appTech" placeholder="HTML, CSS, JS">
    </div>

    <!-- ============ VIDEO (simplified) ============ -->
    <div id="videoQ" class="conditional">
      <hr><h2>🎬 Video</h2>
      <label>Type</label><select id="videoCategory"><option value="Promo">Promo</option><option value="Tutorial">Tutorial</option></select>
      <label>Length</label><input type="text" id="videoLength" placeholder="2 minutes">
      <label>Tone</label><input type="text" id="videoTone" placeholder="energetic">
      <label>Key message</label><textarea id="videoMessage" rows="2" placeholder="main points..."></textarea>
    </div>

    <!-- ============ IMAGE ============ -->
    <div id="imageQ" class="conditional">
      <hr><h2>🎨 Image / Graphic</h2>
      <label>Type</label><select id="imgType"><option value="Logo">Logo</option><option value="Poster">Poster</option></select>
      <label>Subject</label><textarea id="imgSubject" rows="2" placeholder="a logo for..."></textarea>
      <label>Style</label><input type="text" id="imgStyle" placeholder="minimalist">
      <label>Colours</label><input type="text" id="imgColors" placeholder="warm pastels">
    </div>

    <!-- Final touches -->
    <hr><h2>🎯 Final Touches</h2>
    <label>Tone</label>
    <select id="tone"><option value="Professional">Professional</option><option value="Casual">Casual</option></select>
    <label for="extra">Any extra notes</label>
    <textarea id="extra" rows="2"></textarea>

    <div class="button-group">
      <button id="craftBtn">✨ Craft My Prompt</button>
      <button id="clearBtn" class="secondary-btn">🗑️ Clear</button>
    </div>
    <p id="status"></p>
  </section>

  <!-- Result -->
  <section class="card" id="resultCard" style="display: none;">
    <h2>Your Prompt</h2>
    <div class="output" id="result"></div>
    <div class="button-group">
      <button id="copyBtn" class="secondary-btn">📋 Copy</button>
      <button id="downloadBtn" class="secondary-btn">💾 Download</button>
      <button id="rateBtn" class="secondary-btn">🤖 Rate & Improve</button>
    </div>
    <div class="review-panel" id="reviewPanel">
      <span class="review-rating" id="reviewRating"></span>
      <p id="reviewFeedback"></p>
      <button id="applyImprovementBtn" class="secondary-btn" style="display: none;">✨ Apply Improved Prompt</button>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = "https://udlmyspetkjzcdkfshgl.supabase.co";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4";
    const EDGE_URL = `${SUPABASE_URL}/functions/v1/api-key`;

    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

    // Conditional sections
    const typeSelect = document.getElementById('type');
    const sections = {
      Website: document.getElementById('websiteQ'),
      'Web App': document.getElementById('appQ'),
      Video: document.getElementById('videoQ'),
      'Image / Graphic': document.getElementById('imageQ'),
    };
    typeSelect.addEventListener('change', () => {
      Object.values(sections).forEach(s => s.classList.remove('show'));
      const type = typeSelect.value;
      if (sections[type]) sections[type].classList.add('show');
    });

    // Helper to get checked checkbox values
    function getChecked(name) {
      return [...document.querySelectorAll(`#${name} input[type="checkbox"]:checked`)].map(cb => cb.value);
    }

    function getAnswers() {
      const ids = [...document.querySelectorAll('input[type="text"], input[type="url"], select, textarea')].map(el => el.id).filter(Boolean);
      const ans = {};
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el && el.value.trim() !== '') ans[id] = el.value.trim();
      });
      // Add checkbox groups
      const audience = getChecked('audienceCheckboxes');
      if (audience.length) ans.webAudience = audience.join(', ');
      const pages = getChecked('pagesCheckboxes');
      if (pages.length) ans.webPages = pages.join(', ');
      const features = getChecked('featuresCheckboxes');
      if (features.length) ans.webFeatures = features.join(', ');
      // Social links
      ['instagram','facebook','googleBusiness'].forEach(k => {
        const val = document.getElementById(k)?.value?.trim();
        if (val) ans[k] = val;
      });
      return ans;
    }

    // Smart prompt builder (Website)
    function buildWebsite(a) {
      let p = `Act as a senior full‑stack web developer & UI/UX designer. Create a complete, responsive website for "${a.webName || 'the business'}".\n\n`;
      p += `**Business & Audience**\n- Name: ${a.webName || 'N/A'}\n`;
      if (a.webIndustry) p += `- Industry: ${a.webIndustry}\n`;
      if (a.webAudience) p += `- Target audience: ${a.webAudience}\n`;
      if (a.webLocation) p += `- Location: ${a.webLocation}\n`;
      if (a.webGoalAction) p += `- Primary goal: ${a.webGoalAction}\n`;
      if (a.instagram) p += `- Instagram: ${a.instagram}\n`;
      if (a.facebook) p += `- Facebook: ${a.facebook}\n`;
      if (a.googleBusiness) p += `- Google Business: ${a.googleBusiness}\n`;
      p += '\n';
      if (a.webTagline) p += `**Tagline:** "${a.webTagline}"\n\n`;
      if (a.webPages) p += `**Pages / Sections:** ${a.webPages}\n\n`;
      if (a.webFeatures) p += `**Features:** ${a.webFeatures}\n\n`;
      if (a.webColors || a.webFonts || a.webInspiration) {
        p += `**Design System**\n`;
        if (a.webColors) p += `- Colors: ${a.webColors}\n`;
        if (a.webFonts) p += `- Typography: ${a.webFonts}\n`;
        if (a.webInspiration) p += `- Inspiration: ${a.webInspiration}\n`;
        p += `- Layout: ${a.webLayoutStructure || 'single-page'}\n\n`;
      }
      p += `**Technical Requirements**\n- Responsive: ${a.webResponsive || 'mobile-first, 768px'}\n`;
      if (a.extra) p += `\n**Additional Notes**\n${a.extra}\n`;
      p += `\nDeliver a single HTML file with embedded CSS & vanilla JS. Use semantic HTML5 & CSS custom properties. Output only the complete code.`;
      return p;
    }

    function buildWebApp(a) {
      return `Act as a full‑stack developer. Build "${a.appName || 'the app'}".\nProblem: ${a.appProblem}\nAudience: ${a.appAudience}\nFeatures: ${a.appFeatures}\nDesign: ${a.appDesign}\nTech: ${a.appTech}\nCreate a single‑page app with only client‑side code. Output only the complete code.`;
    }

    function buildVideo(a) {
      return `Act as a scriptwriter. Write a ${a.videoCategory || 'promo'} script (${a.videoLength || '2 min'}) about: "${a.goal || ''}".\nTone: ${a.videoTone}\nMessage: ${a.videoMessage}\nOutput only the full script.`;
    }

    function buildImage(a) {
      return `Act as an AI image prompt creator. Generate a DALL·E/Midjourney prompt.\nSubject: ${a.imgSubject}\nStyle: ${a.imgStyle}\nColors: ${a.imgColors}\nType: ${a.imgType}\nOutput only the image prompt.`;
    }

    function buildGeneric(a) {
      return `Act as a prompt engineer. Create a detailed prompt for: "${a.goal || ''}". Output only the final prompt.`;
    }

    function buildPrompt(answers) {
      const media = answers.mediaType || answers.type || 'Other';
      switch (media) {
        case 'Website': return buildWebsite(answers);
        case 'Web App': return buildWebApp(answers);
        case 'Video': return buildVideo(answers);
        case 'Image / Graphic': return buildImage(answers);
        default: return buildGeneric(answers);
      }
    }

    // Craft
    document.getElementById('craftBtn').addEventListener('click', () => {
      const answers = getAnswers();
      if (!answers.type && !answers.goal) return alert('Please choose a type and write a goal.');
      const prompt = buildPrompt(answers);
      document.getElementById('result').textContent = prompt;
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('status').textContent = '✅ Prompt ready!';
      saveToHistory(prompt);
    });

    // Copy & Download
    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('result').textContent).then(() => showToast('Copied!'));
    });
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const blob = new Blob([document.getElementById('result').textContent], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'prompt.txt';
      a.click();
      showToast('Downloaded!');
    });

    // Rate & Improve (AI)
    let improvedPromptText = null;
    document.getElementById('rateBtn').addEventListener('click', async () => {
      const original = document.getElementById('result').textContent;
      if (!original) return;
      const btn = document.getElementById('rateBtn');
      btn.disabled = true;
      btn.textContent = 'Reviewing...';
      try {
        const res = await fetch(EDGE_URL, {
          method: 'POST',
          headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${ANON_KEY}`, 'apikey':ANON_KEY },
          body: JSON.stringify({ mode:'review', prompt: original })
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const review = data.review;
        document.getElementById('reviewRating').textContent = `⭐ ${review.rating}/10`;
        document.getElementById('reviewFeedback').textContent = review.feedback;
        const applyBtn = document.getElementById('applyImprovementBtn');
        if (review.improvedPrompt) {
          improvedPromptText = review.improvedPrompt;
          applyBtn.style.display = 'inline-block';
        } else {
          applyBtn.style.display = 'none';
        }
        document.getElementById('reviewPanel').classList.add('show');
      } catch (err) {
        showToast('Review failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🤖 Rate & Improve';
      }
    });
    document.getElementById('applyImprovementBtn').addEventListener('click', () => {
      if (improvedPromptText) {
        document.getElementById('result').textContent = improvedPromptText;
        document.getElementById('reviewPanel').classList.remove('show');
        saveToHistory(improvedPromptText);
      }
    });

    // Clear
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.querySelectorAll('input[type="text"], input[type="url"], textarea').forEach(el => el.value = '');
      document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
      document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
      document.getElementById('resultCard').style.display = 'none';
      Object.values(sections).forEach(s => s.classList.remove('show'));
    });

    // Toast
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // History
    function saveToHistory(prompt) {
      const history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
      history.unshift({ date: new Date().toISOString(), prompt });
      localStorage.setItem('promptHistory', JSON.stringify(history.slice(0, 10)));
    }
  </script>
</body>
</html>
