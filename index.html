<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Crafter Pro ✨</title>
  <style>
    :root {
      --bg: #fff;
      --card: #f5f5ff;
      --text: #222;
      --primary: #6366f1;
      --radius: 1rem;
    }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
    label { display: block; font-weight: 600; margin: 1.2rem 0 0.25rem; }
    small { color: #666; font-weight: normal; }
    select, textarea, input {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-family: inherit;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 1.5rem;
    }
    button:disabled { opacity: 0.6; }
    .output {
      background: white;
      border: 1px solid #eee;
      border-radius: 0.5rem;
      padding: 1rem;
      min-height: 80px;
      white-space: pre-wrap;
      font-family: monospace;
      margin: 0.5rem 0 1rem;
    }
    .loader {
      display: inline-block;
      width: 1rem; height: 1rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 0.9rem; color: #666; }
    .conditional { display: none; }
    .show { display: block; }
    hr { border: 0; border-top: 1px solid #ddd; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <h1>✨ Prompt Crafter Pro</h1>
  <p style="color:#666;">Answer a few detailed questions and get a **perfect, AI‑ready prompt**.</p>

  <div class="card">
    <!-- SECTION 1: WHAT -->
    <label>1. What do you want to create?</label>
    <select id="type" onchange="showConditional()">
      <option value="">-- Choose --</option>
      <option value="Website">Website</option>
      <option value="Web App">Web App</option>
      <option value="Video">Video</option>
      <option value="Image / Graphic">Image / Graphic</option>
      <option value="Other">Other</option>
    </select>

    <label>2. Describe your goal in one sentence</label>
    <textarea id="goal" rows="2" placeholder="e.g. A landing page to sell handmade candles"></textarea>

    <!-- SECTION 2: CONDITIONAL DETAILS (depends on type) -->

    <!-- ---- WEBSITE ---- -->
    <div id="websiteQ" class="conditional">
      <hr>
      <h3 style="margin:0 0 0.5rem;">🌐 Website Details</h3>

      <label>3. Website type</label>
      <select id="webType">
        <option value="Business site">Business site</option>
        <option value="Online store">Online store</option>
        <option value="Portfolio">Portfolio</option>
        <option value="Blog">Blog</option>
        <option value="Landing page">Landing page</option>
        <option value="Educational">Educational</option>
        <option value="Other">Other</option>
      </select>

      <label>4. Business / project name</label>
      <input type="text" id="webName" placeholder="e.g. Candle Bliss">

      <label>5. Industry / niche</label>
      <input type="text" id="webIndustry" placeholder="handmade goods, technology, health">

      <label>6. Target audience</label>
      <input type="text" id="webAudience" placeholder="young adults, parents, tech enthusiasts">

      <label>7. Location (if relevant)</label>
      <input type="text" id="webLocation" placeholder="New York, worldwide, online only">

      <label>8. Main goal for visitors</label>
      <input type="text" id="webGoal" placeholder="purchase, sign up, contact, learn more">

      <label>9. Key pages / sections needed</label>
      <textarea id="webPages" rows="3" placeholder="Home, About, Products, Contact, Blog"></textarea>

      <label>10. Specific features</label>
      <textarea id="webFeatures" rows="3" placeholder="booking system, gallery, newsletter signup, live chat, dark mode"></textarea>

      <label>11. Preferred colours / visual style</label>
      <input type="text" id="webColors" placeholder="soft pastels, blue and white, dark mode">

      <label>12. Competitor or inspiration website (URL or description)</label>
      <input type="text" id="webInspiration" placeholder="e.g. similar to apple.com">

      <label>13. Must-have content / text</label>
      <textarea id="webContent" rows="2" placeholder="slogan, tagline, special offer"></textarea>
    </div>

    <!-- ---- WEB APP ---- -->
    <div id="appQ" class="conditional">
      <hr>
      <h3 style="margin:0 0 0.5rem;">📱 Web App Details</h3>

      <label>3. App name</label>
      <input type="text" id="appName" placeholder="e.g. Expense Tracker Pro">

      <label>4. Main problem it solves</label>
      <textarea id="appProblem" rows="2" placeholder="helps people track daily spending easily"></textarea>

      <label>5. Target users</label>
      <input type="text" id="appAudience" placeholder="students, freelancers, small business owners">

      <label>6. Core features</label>
      <textarea id="appFeatures" rows="3" placeholder="user login, dashboard, data visualization, export to CSV, notifications"></textarea>

      <label>7. Platform / device</label>
      <select id="appPlatform">
        <option value="Desktop & Mobile">Desktop & Mobile</option>
        <option value="Desktop only">Desktop only</option>
        <option value="Mobile only">Mobile only</option>
      </select>

      <label>8. Look and feel / design style</label>
      <input type="text" id="appDesign" placeholder="minimalist, modern, colorful, professional">

      <label>9. Any specific technologies required?</label>
      <input type="text" id="appTech" placeholder="React, Vue, Firebase, etc.">

      <label>10. Additional context</label>
      <textarea id="appContext" rows="2" placeholder="e.g. needs offline support, must be fast"></textarea>
    </div>

    <!-- ---- VIDEO ---- -->
    <div id="videoQ" class="conditional">
      <hr>
      <h3 style="margin:0 0 0.5rem;">🎬 Video Details</h3>

      <label>3. Video type</label>
      <select id="videoCategory">
        <option value="Tutorial">Tutorial / How-to</option>
        <option value="Promo">Promotional / Ad</option>
        <option value="Explainer">Explainer</option>
        <option value="Vlog">Vlog</option>
        <option value="Social media clip">Social media clip</option>
        <option value="Product demo">Product demo</option>
        <option value="Other">Other</option>
      </select>

      <label>4. Video length</label>
      <input type="text" id="videoLength" placeholder="30 seconds, 2 minutes, 10 minutes">

      <label>5. Target audience</label>
      <input type="text" id="videoAudience" placeholder="tech enthusiasts, parents, students">

      <label>6. Mood / tone</label>
      <input type="text" id="videoTone" placeholder="energetic, serious, funny, inspirational">

      <label>7. Key message / script outline</label>
      <textarea id="videoMessage" rows="3" placeholder="Main points to cover, call to action..."></textarea>

      <label>8. Visual style references</label>
      <input type="text" id="videoStyle" placeholder="animated, live-action, minimalistic, like Apple ads">

      <label>9. Music / sound preferences</label>
      <input type="text" id="videoMusic" placeholder="upbeat background, soft piano, no music">

      <label>10. Where will it be posted?</label>
      <input type="text" id="videoPlatform" placeholder="YouTube, Instagram, TikTok, website">

      <label>11. Any text / captions needed?</label>
      <textarea id="videoCaptions" rows="2" placeholder="subtitles, on-screen text, lower thirds"></textarea>
    </div>

    <!-- ---- IMAGE / GRAPHIC ---- -->
    <div id="imageQ" class="conditional">
      <hr>
      <h3 style="margin:0 0 0.5rem;">🎨 Image / Graphic Details</h3>

      <label>3. Type of graphic</label>
      <select id="imgType">
        <option value="Logo">Logo</option>
        <option value="Poster">Poster</option>
        <option value="Social media post">Social media post</option>
        <option value="Illustration">Illustration</option>
        <option value="Banner">Banner</option>
        <option value="Infographic">Infographic</option>
        <option value="Other">Other</option>
      </select>

      <label>4. Subject / description</label>
      <textarea id="imgSubject" rows="2" placeholder="a bakery logo with a croissant and coffee cup"></textarea>

      <label>5. Style / vibe</label>
      <input type="text" id="imgStyle" placeholder="minimalist, vintage, hand-drawn, modern flat">

      <label>6. Colour palette</label>
      <input type="text" id="imgColors" placeholder="warm tones, pastel blue and yellow, black & white">

      <label>7. Any text to include</label>
      <input type="text" id="imgText" placeholder="'Fresh Baked Daily'">

      <label>8. Dimensions / format</label>
      <input type="text" id="imgSize" placeholder="1080x1080 for Instagram, A4 print, etc.">

      <label>9. Usage context</label>
      <input type="text" id="imgUsage" placeholder="website header, social media profile, business card">

      <label>10. Reference images or inspiration</label>
      <textarea id="imgInspo" rows="2" placeholder="similar to Nike logo style, minimal like Apple"></textarea>
    </div>

    <!-- SECTION 3: GENERAL FINAL QUESTIONS (always shown) -->
    <hr>
    <h3 style="margin:0 0 0.5rem;">🎯 Final Touches</h3>

    <label>Tone / Style</label>
    <select id="tone">
      <option value="Not specified">No preference</option>
      <option value="Professional">Professional</option>
      <option value="Casual">Casual</option>
      <option value="Fun">Fun / Playful</option>
      <option value="Simple">Simple / Beginner</option>
      <option value="Modern">Modern & Sleek</option>
    </select>

    <label>Target AI model (optional)</label>
    <input type="text" id="targetAI" placeholder="ChatGPT, Gemini, Claude, etc.">

    <label>Any extra notes or special requests</label>
    <textarea id="extra" rows="3" placeholder="e.g. avoid technical jargon, focus on accessibility, include examples"></textarea>

    <button id="generateBtn" onclick="generate()">✨ Create My Perfect Prompt</button>
    <p id="status"></p>
  </div>

  <div class="card">
    <label>Your Complete AI Prompt:</label>
    <div class="output" id="result">Your prompt will appear here...</div>
    <button onclick="copyPrompt()" style="width:auto; padding:0.5rem 1rem;">📋 Copy</button>
  </div>

  <script>
    const EDGE_URL = "https://udlmyspetkjzcdkfshgl.supabase.co/functions/v1/api-key";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4";

    function showConditional() {
      const type = document.getElementById("type").value;
      document.getElementById("websiteQ").classList.toggle("show", type === "Website");
      document.getElementById("appQ").classList.toggle("show", type === "Web App");
      document.getElementById("videoQ").classList.toggle("show", type === "Video");
      document.getElementById("imageQ").classList.toggle("show", type === "Image / Graphic");
    }

    function collectAnswers() {
      const type = document.getElementById("type").value;
      const answers = {
        mediaType: type,
        goal: document.getElementById("goal").value,
        tone: document.getElementById("tone").value,
        targetAI: document.getElementById("targetAI").value,
        extra: document.getElementById("extra").value,
      };

      if (type === "Website") {
        answers.webType = document.getElementById("webType").value;
        answers.webName = document.getElementById("webName").value;
        answers.webIndustry = document.getElementById("webIndustry").value;
        answers.webAudience = document.getElementById("webAudience").value;
        answers.webLocation = document.getElementById("webLocation").value;
        answers.webGoal = document.getElementById("webGoal").value;
        answers.webPages = document.getElementById("webPages").value;
        answers.webFeatures = document.getElementById("webFeatures").value;
        answers.webColors = document.getElementById("webColors").value;
        answers.webInspiration = document.getElementById("webInspiration").value;
        answers.webContent = document.getElementById("webContent").value;
      } else if (type === "Web App") {
        answers.appName = document.getElementById("appName").value;
        answers.appProblem = document.getElementById("appProblem").value;
        answers.appAudience = document.getElementById("appAudience").value;
        answers.appFeatures = document.getElementById("appFeatures").value;
        answers.appPlatform = document.getElementById("appPlatform").value;
        answers.appDesign = document.getElementById("appDesign").value;
        answers.appTech = document.getElementById("appTech").value;
        answers.appContext = document.getElementById("appContext").value;
      } else if (type === "Video") {
        answers.videoCategory = document.getElementById("videoCategory").value;
        answers.videoLength = document.getElementById("videoLength").value;
        answers.videoAudience = document.getElementById("videoAudience").value;
        answers.videoTone = document.getElementById("videoTone").value;
        answers.videoMessage = document.getElementById("videoMessage").value;
        answers.videoStyle = document.getElementById("videoStyle").value;
        answers.videoMusic = document.getElementById("videoMusic").value;
        answers.videoPlatform = document.getElementById("videoPlatform").value;
        answers.videoCaptions = document.getElementById("videoCaptions").value;
      } else if (type === "Image / Graphic") {
        answers.imgType = document.getElementById("imgType").value;
        answers.imgSubject = document.getElementById("imgSubject").value;
        answers.imgStyle = document.getElementById("imgStyle").value;
        answers.imgColors = document.getElementById("imgColors").value;
        answers.imgText = document.getElementById("imgText").value;
        answers.imgSize = document.getElementById("imgSize").value;
        answers.imgUsage = document.getElementById("imgUsage").value;
        answers.imgInspo = document.getElementById("imgInspo").value;
      }

      return answers;
    }

    async function generate() {
      const btn = document.getElementById("generateBtn");
      const status = document.getElementById("status");
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span> Creating...';
      status.textContent = "Crafting your detailed prompt...";

      const answers = collectAnswers();
      try {
        const res = await fetch(EDGE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${ANON_KEY}`,
            "apikey": ANON_KEY
          },
          body: JSON.stringify(answers)
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        const data = await res.json();
        document.getElementById("result").textContent = data.prompt || "No prompt returned.";
        status.textContent = "✅ Complete! Your prompt is ready.";
      } catch (err) {
        status.textContent = "❌ Error: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "✨ Create My Perfect Prompt";
      }
    }

    function copyPrompt() {
      const text = document.getElementById("result").textContent;
      navigator.clipboard.writeText(text).then(() => alert("Copied!"));
    }
  </script>
</body>
</html>
