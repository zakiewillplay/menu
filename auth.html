<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Boss – Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary: #FF6B35;
            --bg: #0f0f13;
            --card: rgba(30,30,35,0.9);
            --border: rgba(255,255,255,0.1);
            --text: #f0f0f0;
            --muted: #aaa;
            --input-bg: rgba(20,20,25,0.7);
        }
        body.light-mode {
            --bg: #f2f1ed;
            --card: rgba(255,255,255,0.95);
            --border: rgba(0,0,0,0.15);
            --text: #1a1a1a;
            --muted: #555;
            --input-bg: #fff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.4s;
            padding: 1rem;
        }
        .auth-card {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        .logo { text-align: center; font-size: 3rem; margin-bottom: 0.5rem; }
        h2 { text-align: center; margin-bottom: 1.8rem; font-weight: 600; color: var(--primary); }
        .tabs { display: flex; margin-bottom: 2rem; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .tabs button {
            flex:1; padding:0.9rem; border:none; cursor:pointer; background: transparent; color: var(--muted); font-weight: 600; transition:0.2s;
        }
        .tabs button.active { background: var(--primary); color:#fff; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; color: var(--muted); }
        input {
            width:100%; padding:0.9rem 1rem; border-radius: 12px; border:1px solid var(--border);
            background: var(--input-bg); color: var(--text); font-size:0.95rem; transition:0.2s;
        }
        input:focus { outline:none; border-color: var(--primary); }
        .btn {
            width:100%; padding:1rem; border:none; border-radius: 12px; background: var(--primary);
            color:#fff; font-weight:700; font-size:1rem; cursor:pointer; margin-top:0.5rem; transition:0.2s;
        }
        .btn:hover { opacity:0.9; }
        .btn:disabled { opacity:0.6; cursor:not-allowed; }
        .alt-links { text-align: center; margin-top: 1.2rem; font-size:0.85rem; color: var(--muted); }
        .alt-links a { color: var(--primary); cursor:pointer; text-decoration: underline; }
        .toast {
            position: fixed; top: 20px; right: 20px; background: #27ae60; color: #fff; padding: 1rem 1.5rem;
            border-radius: 12px; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: translateX(120%); transition: transform 0.3s ease; font-weight:500;
        }
        .toast.error { background: #c0392b; }
        .toast.show { transform: translateX(0); }
        .hidden { display: none !important; }
        .theme-toggle {
            position: absolute; top: 1.5rem; right: 1.5rem;
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer; font-size:0.9rem;
        }
    </style>
</head>
<body class="light-mode">
    <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
    <div class="auth-card">
        <div class="logo">☕</div>
        <h2 id="authTitle">Welcome Back</h2>
        <div id="toast" class="toast"></div>
        <div class="tabs" id="tabsRow">
            <button id="tabLogin" class="active">Login</button>
            <button id="tabSignup">Sign Up</button>
        </div>
        <form id="authForm">
            <div class="form-group hidden" id="nameGroup">
                <label for="cafeName">Cafe Name</label>
                <input type="text" id="cafeName" placeholder="My Cafe">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="form-group hidden" id="confirmGroup">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submitBtn">Login</button>
        </form>
        <div class="alt-links">
            <span id="toggleText">Don't have an account?</span>
            <a id="toggleLink">Sign Up</a>
            <span style="margin:0 0.5rem;">|</span>
            <a id="forgotLink">Forgot Password?</a>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://hhkuvffjjaglhutlxncm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhoa3V2ZmZqamFnbGh1dGx4bmNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTY3MzEsImV4cCI6MjA5NDY3MjczMX0.wbuGuK9hV9ie4afGuyximb7iK_g9dj9CVaXNY8guxDw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const isRecovery = urlParams.get('type') === 'recovery';
        let mode = isRecovery ? 'recovery' : 'login';

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('light-mode') ? '🌙 Dark' : '☀️ Light';
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') document.body.classList.remove('light-mode');
            else if (saved === 'light') document.body.classList.add('light-mode');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.remove('light-mode');
            toggleTheme(); // update button text
        })();

        function showToast(msg, isError=false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (isError ? 'error' : '') + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateUI() {
            document.getElementById('authTitle').textContent = mode === 'login' ? 'Welcome Back' : (mode === 'signup' ? 'Create Your Cafe' : (mode==='forgot' ? 'Reset Password' : 'Set New Password'));
            document.getElementById('tabsRow').classList.toggle('hidden', mode === 'forgot' || mode === 'recovery');
            document.getElementById('nameGroup').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('confirmGroup').classList.toggle('hidden', mode !== 'signup' && mode !== 'recovery');
            document.getElementById('toggleText').textContent = mode === 'login' ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleLink').textContent = mode === 'login' ? 'Sign Up' : 'Login';
            document.getElementById('forgotLink').style.display = mode === 'login' ? 'inline' : 'none';
            document.getElementById('submitBtn').textContent = mode === 'login' ? 'Login' : (mode === 'signup' ? 'Sign Up' : (mode==='forgot' ? 'Send Reset Link' : 'Update Password'));
        }
        document.getElementById('tabLogin').addEventListener('click', ()=>{ mode='login'; updateUI(); });
        document.getElementById('tabSignup').addEventListener('click', ()=>{ mode='signup'; updateUI(); });
        document.getElementById('toggleLink').addEventListener('click', ()=>{ mode = mode==='login'?'signup':'login'; updateUI(); });
        document.getElementById('forgotLink').addEventListener('click', (e)=>{ e.preventDefault(); mode='forgot'; updateUI(); });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                if (mode === 'recovery') {
                    const confirm = document.getElementById('confirmPassword').value;
                    if (password !== confirm) { showToast('Passwords do not match.', true); btn.disabled=false; return; }
                    const { error } = await supabase.auth.updateUser({ password });
                    if (error) throw error;
                    showToast('Password updated! Redirecting...');
                    setTimeout(() => window.location.href = 'auth.html', 2000);
                    return;
                }
                if (mode === 'forgot') {
                    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/CafeBoss.io/auth.html?type=recovery' });
                    if (error) throw error;
                    showToast('Reset link sent! Check your email.');
                    btn.disabled = false;
                    return;
                }
                if (mode === 'signup') {
                    const confirm = document.getElementById('confirmPassword').value;
                    if (password !== confirm) { showToast('Passwords do not match.', true); btn.disabled=false; return; }
                    const cafeName = document.getElementById('cafeName').value.trim() || 'My Cafe';
                    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
                    if (signUpError) {
                        if (signUpError.message.includes('already registered')) showToast('Email already registered. Try logging in.', true);
                        else showToast(signUpError.message, true);
                        btn.disabled=false; return;
                    }
                    if (signUpData.user) {
                        const { error: cafeError } = await supabase.from('cafes').insert({ owner_id: signUpData.user.id, cafe_name: cafeName });
                        if (cafeError && cafeError.code !== '23505') console.warn(cafeError);
                    }
                    showToast('Account created! You can now log in.');
                    setTimeout(() => { mode='login'; updateUI(); }, 1500);
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    if (data.user) window.location.href = 'dashboard.html';
                }
            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.disabled = false;
            }
        });
        updateUI();
        if (isRecovery) { mode='recovery'; updateUI(); }
    </script>
</body>
</html>
