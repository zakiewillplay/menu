<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cafe Boss - Login</title>
    <style>
        :root {
            --primary: #FF6B35;
            --accent: #2F3E46;
            --cream: #FDFCDC;
            --bg: #1a1c1d;
            --text: #f0f0f0;
            --card-bg: #2a2a2c;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem 1.8rem;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        h2 { text-align: center; color: var(--primary); font-size: 1.6rem; margin-bottom: 1.5rem; }
        .tabs { display: flex; margin-bottom: 2rem; background: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .tab { flex:1; text-align: center; padding: 0.7rem; cursor: pointer; color: #aaa; font-weight: 500; }
        .tab.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; opacity: 0.8; }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: var(--cream);
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--primary); }
        button {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.8rem;
        }
        button:active { transform: scale(0.97); }
        .error, .success { font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        .error { color: #ff4d4d; } .success { color: #4caf50; }
        .back-link, .forgot-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
        .forgot-link a, .back-link a { color: var(--primary); text-decoration: none; cursor: pointer; }
        .hidden { display: none !important; }
        .form-message { font-size: 0.85rem; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <!-- Normal View -->
        <div id="normalView">
            <h2>Welcome</h2>
            <div class="tabs">
                <div class="tab active" id="loginTab">Login</div>
                <div class="tab" id="signupTab">Sign Up</div>
            </div>
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com"/>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" minlength="6"/>
                </div>
                <p class="error" id="errorMsg"></p>
                <button type="submit" id="submitBtn">Log in</button>
            </form>
            <div class="forgot-link"><a id="forgotPasswordLink">Forgot Password?</a></div>
            <div class="back-link"><a href="index.html">← Back to home</a></div>
        </div>

        <!-- Reset Request -->
        <div id="resetRequestView" class="hidden">
            <h2>Reset Password</h2>
            <p class="form-message">Enter your email and we’ll send you a reset link.</p>
            <form id="resetForm">
                <div class="form-group">
                    <label for="resetEmail">Email</label>
                    <input type="email" id="resetEmail" required placeholder="you@example.com"/>
                </div>
                <p class="error" id="resetError"></p>
                <p class="success" id="resetSuccess"></p>
                <button type="submit">Send Reset Link</button>
            </form>
            <div class="back-link"><a id="backToLoginLink">← Back to Login</a></div>
        </div>

        <!-- New Password -->
        <div id="newPasswordView" class="hidden">
            <h2>New Password</h2>
            <form id="newPasswordForm">
                <div class="form-group">
                    <label for="newPassword">Password</label>
                    <input type="password" id="newPassword" required minlength="6" placeholder="••••••••"/>
                </div>
                <p class="error" id="newPasswordError"></p>
                <p class="success" id="newPasswordSuccess"></p>
                <button type="submit">Update Password</button>
            </form>
            <div class="back-link"><a href="auth.html">← Login</a></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://phunzwqocgtgnpsgvsyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBodW56d3FvY2d0Z25wc2d2c3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ2ODIsImV4cCI6MjA5NDA5MDY4Mn0.gWJ_NORZxMWz0EPJ425gDZew7MJUxWdo6L67snAE0dI';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        function main() {
            const client = window.client;
            const urlParams = new URLSearchParams(window.location.search);
            const isRecovery = urlParams.get('type') === 'recovery';

            const normalView = document.getElementById('normalView');
            const resetRequestView = document.getElementById('resetRequestView');
            const newPasswordView = document.getElementById('newPasswordView');

            if (isRecovery) {
                normalView.classList.add('hidden');
                resetRequestView.classList.add('hidden');
                newPasswordView.classList.remove('hidden');
            } else {
                normalView.classList.remove('hidden');
                resetRequestView.classList.add('hidden');
                newPasswordView.classList.add('hidden');
            }

            // Normal login/signup
            const form = document.getElementById('authForm');
            const emailInp = document.getElementById('email');
            const passInp = document.getElementById('password');
            const errorEl = document.getElementById('errorMsg');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const submitBtn = document.getElementById('submitBtn');
            let mode = 'login';

            loginTab.addEventListener('click', () => switchMode('login'));
            signupTab.addEventListener('click', () => switchMode('signup'));

            function switchMode(m) {
                mode = m;
                loginTab.classList.toggle('active', m === 'login');
                signupTab.classList.toggle('active', m === 'signup');
                submitBtn.textContent = m === 'login' ? 'Log in' : 'Sign Up';
                errorEl.style.display = 'none';
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorEl.style.display = 'none';
                const email = emailInp.value.trim();
                const password = passInp.value;
                try {
                    if (mode === 'signup') {
                        const { data, error } = await client.auth.signUp({ email, password });
                        if (error) throw error;
                        if (data.user) {
                            const { error: insertErr } = await client.from('cafes').insert({ owner_id: data.user.id });
                            if (insertErr && insertErr.code !== '23505') throw insertErr;
                            window.location.href = 'dashboard.html';
                        }
                    } else {
                        const { error } = await client.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        window.location.href = 'dashboard.html';
                    }
                } catch (err) {
                    errorEl.textContent = err.message;
                    errorEl.style.display = 'block';
                }
            });

            // Forgot password link
            document.getElementById('forgotPasswordLink').addEventListener('click', () => {
                normalView.classList.add('hidden');
                resetRequestView.classList.remove('hidden');
            });
            document.getElementById('backToLoginLink').addEventListener('click', (e) => {
                e.preventDefault();
                normalView.classList.remove('hidden');
                resetRequestView.classList.add('hidden');
            });

            const resetForm = document.getElementById('resetForm');
            const resetEmail = document.getElementById('resetEmail');
            const resetError = document.getElementById('resetError');
            const resetSuccess = document.getElementById('resetSuccess');

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                resetError.style.display = 'none';
                resetSuccess.style.display = 'none';
                try {
                    const { error } = await client.auth.resetPasswordForEmail(resetEmail.value.trim(), {
                        redirectTo: window.location.origin + '/auth.html?type=recovery',
                    });
                    if (error) throw error;
                    resetSuccess.textContent = 'Reset link sent! Check your email.';
                    resetSuccess.style.display = 'block';
                } catch (err) {
                    resetError.textContent = err.message;
                    resetError.style.display = 'block';
                }
            });

            // New password form
            const newPasswordForm = document.getElementById('newPasswordForm');
            const newPass = document.getElementById('newPassword');
            const newPassErr = document.getElementById('newPasswordError');
            const newPassOk = document.getElementById('newPasswordSuccess');

            newPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                newPassErr.style.display = 'none';
                newPassOk.style.display = 'none';
                try {
                    const { error } = await client.auth.updateUser({ password: newPass.value });
                    if (error) throw error;
                    newPassOk.textContent = 'Password updated! Redirecting…';
                    newPassOk.style.display = 'block';
                    setTimeout(() => { window.location.href = 'auth.html'; }, 2000);
                } catch (err) {
                    newPassErr.textContent = err.message;
                    newPassErr.style.display = 'block';
                }
            });

            // Redirect if already logged in
            if (!isRecovery) {
                client.auth.getSession().then(({ data }) => {
                    if (data.session) window.location.href = 'dashboard.html';
                });
            }
        }
    </script>
</body>
</html>
